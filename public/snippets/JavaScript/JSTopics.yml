- ENTRY:
  EXPLAIN: Set -> Map 変換
  BODY: |
    ■ データ

    const data = [
      { name: "A", type: "M1" },
      { name: "B", type: "M2" },
    ];

    ■ オブジェクト -> Set 生成

    const aSet = new Set( // 🛑 型指定不十分
      data.map((n) => [n.name, n.type]),
    );

    const bSet = new Set<[string, string]>( // ✅ 型指定 Mapへの変換用
      data.map((n) => [n.name, n.type]),
    );

    ■ Set -> Map 生成

    const aMap = new Map(aSet)   // ⛔ 型エラー
    const bMap = new Map(bSet)   // ✅

    const aMap = new Map(
      Array.from(aMap, ([v1,v2])=>[v1, v2]) // ✅ Iterator必須
    );

    const aArray1 = Array.from(aSet);
    const aMap2 = new Map(aArray1);  // ⛔
    const aMap3 = new Map(aArray1 as [string,string][]);  // ✅

    const bArray1 = Array.from(bSet);
    const bMap2 = new Map(bArray1);  // ✅
    const bMap3 = new Map(bArray1 as [string,string][]);  // ✅

- ENTRY:
  EXPLAIN: Map と WeakMap
  BODY: |
    ■ Map

    ・キーは強参照
    ・キー/値は明示的に削除しない限り残る（GCされない）
    ・列挙・サイズ取得が可能
    ・任意の値（オブジェクト、文字列、数値、Symbol など）をキーにできる
    ・map.size、map.keys()、map.entries() 等で列挙できる

    ■ WeakMap

    ・キーは弱参照（キーは必ずオブジェクト）
    ・キーへの他の参照が無くなれば、そのエントリは非決定的にGC対象（時間的保証なし、確認方法なし）
    ・列挙不可・サイズ取得不可・プリミティブ不可
    ・メモリリーク防止に向くがGCは非決定的
    ・size なし、get/set/has/delete のみ

- ENTRY:
  EXPLAIN: Map と WeakMap サンプル
  BODY: |
    ■ Map

    const map = new Map();
    let obj = {id:1};
    map.set(obj, {cached: true});
    obj = null;                         // オブジェクトへの参照を外しても map が強参照

    console.log(map.size);              // エントリが残っている

    map.forEach((v,k)=>{
      if (/* 条件 */) map.delete(k);    // 明示的に削除の必要
    });

    ■ WeakMap

    const w = new WeakMap();
    let node = {el: 'DOM node'};

    w.set(node, {metadata: 'x'});
    node = null;                        // GC でエントリ回収(非決定的)

- ENTRY:
  EXPLAIN: WeakMap 比較
  BODY: |
    WeakMap 比較
  TABLE:
    OPTION:
      ALIGN:
        - left
        - center
        - center
        - left
      HAS_TITLE: true
      WIDTH:
        - 30%
        - 12%
        - 12%
    BODY: |
      プロパティ/機能 	Map 	WeakMap 	機能説明
      *.prototype.constructor	〇	〇	インスタンス生成元のコンストラクタ(書き換え可能)
      *.prototype.size	〇	×	要素数
      *.prototype.delete()	〇	〇	対要素削除
      *.prototype.get()	〇	〇	要素を返す
      *.prototype.has()	〇	〇	要素の存在判定
      *.prototype.set()	〇	〇	[key,value]を要素に格納
      *.prototype.clear()	〇	×	全要素を削除
      *.prototype.entries()	〇	×	[key,value]を持つItelator
      *.prototype.forEach()	〇	×	定義順で要素を列挙
      *.prototype.keys()	〇	×	keyを持つItelator
      *.prototype.values()	〇	×	valueを持つItelator
      *.prototype[@@iterator]()	〇	×	要素列挙時に実行されるIterator関数
      *.prototype[@@toStringTag]()	〇	〇	インスタンスに与えられるオブジェクト種を表す名前
      弱参照	×	〇	keyオブジェクト参照が切れた時、WeakMap 上からも要素を削除

