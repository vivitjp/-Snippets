# Object
#-------------------------------
- ENTRY:
  CATEGORY: オブジェクト

- ENTRY:
  EXPLAIN: カスタム汎用関数
  BODY: |
    ■ Object判定関数

    const isObject = (obj: any) => {
      return obj !== null && typeof obj === "object"
    }

    ■ getStringValueOrEmpty             // 数値=>文字列変換関数

    export const getStringValueOrEmpty = (
      value: number | null | undefined,
      returnValue = ""
    ): string => {
      if (
        value === null ||
        value === undefined ||
        value === 0 ||
        value === Infinity ||
        value === -Infinity ||
        Number.isNaN(value) ||
        !Number(value)
      )
        return returnValue;
      else return String(value);
    };

    ■ Object「空」判定関数

    const isEmpty = (obj: any) => {
      return Object.keys(obj).length === 0 && obj.constructor === Object
    }

    ■ object から undefined を削除

    const removeUndefined = (obj: object) => {
      return Object.fromEntries(
        Object.entries(obj).filter(([, v]) => v !== undefined)
      )
    }

- ENTRY:
  EXPLAIN: DeepCopy
  BODY: |
    ■ サンプルオブジェクト

    const objectFrom = {
      a: 12,
      b: "A",
      c: undefined,
      d: null,
      e: true,
      f: [1, undefined],
      g: { a: 1, b: "B", c: [5, undefined], d: { k: 1 } },
    };

    ■ structuredClone: 望ましい DeepCopy

    const copiedObject = structuredClone(object)

    const objectToClone = structuredClone(objectFrom);
    objectFrom.a = 13;
    console.log(objectFrom);
    console.log(objectToClone);  // objectFromから影響を受けない

    ■ JSON.parse & stringify: 望ましくない DeepCopy

    const deepCopyNG = (objOrArr: object) => {
      return JSON.parse(JSON.stringify(objOrArr))
    }

    const objectToJsonCopy = JSON.parse(JSON.stringify(objectFrom));

    const objectToJsonCopy_Result = {
      a: 12,
      b: "A",
      // c: undefined, <--- 消失: Undefined が削除される
      d: null,
      e: true,
      f: [1, undefined],
      g: { a: 1, b: "B", c: [5, undefined], d: { k: 1 } },
    };

    objectFrom.f[1] = 0
    console.log(objectFrom.f);
    console.log(objectToJsonCopy.f);

    ■ shallowCopy : 浅いコピー(Object)

    const shallowCopy = <T,>(arr: T[]) => {
      return arr.map((list) => ({ ...list }))
    }

