# ----------------------------
# 構造
# ----------------------------
- ENTRY:
  CATEGORY: 構造 & debug

- ENTRY:
  EXPLAIN: switch
  BODY: |
    ■ シグネチャ

    switch ( expression ) {
      case value1:
        statements
        break
      case value2:
        statements  // break を書かないと次の case にフォールスルー
      case value3:
        statements
        break
      default:
        statements
    }

    ■ 注意事項

    ・expression と case の value は厳密等価(===)で比較
    ・break を書かないと次の case にフォールスルー
    ・default は任意。どの case にもマッチしないときに実行

    ■ 例

    ・expression が変数の場合

      const status = getStatus()
      switch (status) {
        case '成功': handleOk(); break
        case 'ng': handleNg(); break
        default: handleUnknown()
      }

    ・定数で分岐する場合

      const KEY = 'ENTER'
      switch (KEY) {
        case 'ENTER': submit(); break
        case 'ESC': cancel(); break
      }

    ・数値の範囲(大なり・小なり)を使う場合（switch(true) + case に条件）

      const n = 42
      switch (true) {
        case n < 0: console.log('負'); break
        case n >= 0 && n < 10: console.log('一桁'); break
        case n >= 10: console.log('二桁以上'); break
      }

    ・フォールスルー（break を意図的に省略）

      switch (ch) {
        case 'a':
        case 'e':
        case 'i':
        case 'o':
        case 'u':
          console.log('母音')
          break
        default:
          console.log('子音')
      }

- ENTRY:
  EXPLAIN: if
  BODY: |
    ■ シグネチャ

    if ( condition ) { statements }
    else if ( condition ) { statements }
    else { statements }

    ■ 注意事項

    ・条件は truthy/falsy で評価。false, 0, '', null, undefined, NaN は falsy
    ・ブロックが1文なら {} 省略可だが可読性のため非推奨
    ・else if は複数連鎖可能。実体は else { if (...) { } } の糖衣

    ■ 例

    ・単純な if / else

      if (score >= 60) pass()
      else fail()

    ・else if で多分岐

      if (x > 0) positive()
      else if (x < 0) negative()
      else zero()

    ・falsy の注意（0 や '' も false 扱い）

      const n = 0
      if (n) console.log('n は truthy')           // 実行されない
      if (n !== undefined && n !== null) console.log('n は存在')  // 明示判定

- ENTRY:
  EXPLAIN: for
  BODY: |
    ■ シグネチャ

    for ( init; condition; update ) { statements }
    for ( const item of iterable ) { statements }
    for ( const key in object ) { statements }

    ■ 注意事項

    ・通常の for: init で初期化、condition が truthy の間繰り返し、update で更新
    ・for...of: イテラブル(配列・文字列・Map・Set 等)の要素を順に取得
    ・for...in: オブジェクトの列挙可能プロパティ名。プロトタイプチェーンも列挙される。配列より Object.keys 等が無難な場合あり
    ・continue で次の反復へ、break でループ脱出

    ■ 例

    ・カウントループ

      for (let i = 0; i < 10; i++) console.log(i)

    ・for...of で配列

      const arr = [1, 2, 3]
      for (const x of arr) console.log(x)

    ・for...in でオブジェクトのキー

      const obj = { a: 1, b: 2 }
      for (const key in obj) console.log(key, obj[key])

    ・break / continue

      for (let i = 0; i < 10; i++) {
        if (i === 3) continue
        if (i === 7) break
        console.log(i)
      }

- ENTRY:
  EXPLAIN: while
  BODY: |
    ■ シグネチャ

    while ( condition ) { statements }

    ■ 注意事項

    ・条件を先に評価。最初から falsy なら1回も実行されない
    ・条件が常に truthy だと無限ループ。break や条件の更新を忘れないこと

    ■ 例

    ・条件が true の間だけ実行

      let n = 0
      while (n < 3) { console.log(n); n++ }

    ・break で脱出

      while (true) {
        const x = getNext()
        if (!x) break
        process(x)
      }

- ENTRY:
  EXPLAIN: do while
  BODY: |
    ■ シグネチャ

    do { statements } while ( condition )

    ■ 注意事項

    ・先に本体を実行してから条件を評価（後判定）
    ・最低1回は本体が実行される。while との違い

    ■ 例

    ・最低1回は実行したい場合

      let input
      do {
        input = prompt('y/n?')
      } while (input !== 'y' && input !== 'n')

    ・カウント（1回目は条件未チェック）

      let i = 0
      do { console.log(i); i++ } while (i < 3)

- ENTRY:
  EXPLAIN: label/goto
  BODY: |
    ■ シグネチャ

    labelName: statement
    break labelName
    continue labelName

    ■ 注意事項

    ・JS に goto はない。ラベルは break/continue と組み合わせて使う
    ・ネストしたループの外側を指定して脱出・次反復できる
    ・ラベルは文(statement)に付ける。関数やブロック単体には付けられない

    ■ 例

    ・二重ループから一気に脱出

      outer: for (let i = 0; i < 3; i++) {
        for (let j = 0; j < 3; j++) {
          if (i === 1 && j === 1) break outer
          console.log(i, j)
        }
      }

    ・continue で外側の次の反復へ

      outer: for (let i = 0; i < 2; i++) {
        for (let j = 0; j < 2; j++) {
          if (j === 1) continue outer
          console.log(i, j)
        }
      }

- ENTRY:
  EXPLAIN: with
  BODY: |
    ■ シグネチャ

    with ( expression ) { statements }

    ■ 注意事項

    ・式の結果のオブジェクトをスコープチェーンの先頭に追加。プロパティを変数のように書ける
    ・strict モードでは構文エラー。使用禁止
    ・非 strict でも非推奨。可読性・パフォーマンス・最適化の妨げ。オブジェクトの分割代入や変数に代入して使う

    ■ 例

    ・with の動作（非 strict かつ非推奨）

      const obj = { a: 1, b: 2 }
      with (obj) { console.log(a + b) }            // 3。a, b が obj から解決

    ・推奨: オブジェクトを変数に

      const { a, b } = obj
      console.log(a + b)

- ENTRY:
  EXPLAIN: try catch finally throw
  BODY: |
    ■ シグネチャ

    try { statements }
    catch ( e ) { statements }
    finally { statements }

    throw expression

    ■ 注意事項

    ・throw で任意の値(Error オブジェクトが一般的)を投げられる
    ・catch の e は ES2019 で省略可能(optional catch binding)。使わないなら catch { } と書ける
    ・finally は return や throw の前にも実行される。クリーンアップに使う
    ・try のあとは catch か finally の少なくとも一方が必須

    ■ 例

      let fd
      try {
        fd = openFile()
        useFile(fd)
      } catch (e) {
        console.error('parse failed', e.message)
      } finally {
        if (fd) closeFile(fd)
      }

      ※ catch で e を省略(ES2019+)

        try { risky() } catch { console.error('failed') }

    ■ 総合例

    ・カスタム例外の定義（Error を継承して name/message を活用）

      class ValidationError extends Error {
        constructor(message, field) {
          super(message)
          this.name = 'ValidationError'
          this.field = field
        }
      }

    ・try 内で throw。catch で種類別処理。finally で必ずクリーンアップ

      let resource = null
      try {
        resource = acquireResource()
        const data = JSON.parse(input)

        // エラースロー
        if (!data.id) throw new ValidationError('id required', 'id')
        if (data.value < 0) throw new RangeError('value must be >= 0')

        // 正常処理
        use(data)
      } 
      // エラー処理
      catch (e) {
        if (e instanceof ValidationError) {
          console.error('ValidationError', e.field, e.message)
        } else if (e instanceof SyntaxError) {
          console.error('JSON parse failed', e.message)
        } else {
          console.error(e.name, e.message)
        }
        throw e
      } 
      // 必ず実行
      finally {
        if (resource) releaseResource(resource)
      }

    ・Error の主なプロパティ: name, message。ES2022 では cause で原因をチェーン可能

      throw new Error('failed', { cause: originalError })

- ENTRY:
  EXPLAIN: debug
  BODY: |
    ■ debugger

    debugger;                                     // デバッガを停止

    ■ console

    console.log(value1, value2, ..., valueN)      // ログを出力
    console.info(value1, value2, ..., valueN)     // 情報を出力
    console.error(value1, value2, ..., valueN)    // エラーを出力
    console.warn(value1, value2, ..., valueN)     // 警告を出力
    console.debug(value1, value2, ..., valueN)    // デバッグ情報を出力
    console.trace(value1, value2, ..., valueN)    // スタックトレースを出力
    console.dir(value)                            // オブジェクトのプロパティを出力
    console.dirxml(value)                         // XML/HTML を出力
    console.clear()                                // コンソールをクリア

    ■ group: グループ

    console.group(value1, value2, ..., valueN)    // グループを開始
    console.groupEnd()                            // グループを終了

      console.group('User')
      console.log('Name: John')
      console.log('Age: 30')
      console.groupEnd()

    ■ count: カウント

    console.count(label)
    console.countReset(label)

    ■ assert: アサーション(条件が false の場合にエラーを投げる)

    console.assert(condition, value1, value2, ..., valueN)

- ENTRY:
  EXPLAIN: debug time
  BODY: |
    ■ time: 時間測定

    console.time(label)
    console.timeEnd(label)
    console.timeLog(label)

    ■ time で計測開始、timeEnd で終了して経過時間を出力。label は同じ文字列を指定

      console.time('fetch')
      await fetch(url)
      console.timeEnd('fetch')                     // fetch: 123.456ms のように表示

    ■ timeLog は計測を止めずに途中の経過時間だけ出力。追加の引数も表示可能

      console.time('loop')
      for (let i = 0; i < 3; i++) {
        doWork(i)
        console.timeLog('loop', `step ${i} done`)
      }
      console.timeEnd('loop')

    ■ label を省略すると 'default' として扱われる

      console.time()
      heavyTask()
      console.timeEnd()                            // default: xxx ms

