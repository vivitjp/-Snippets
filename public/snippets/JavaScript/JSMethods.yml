# 非同期
# ----------------------------
- ENTRY:
  CATEGORY: 非同期

- ENTRY:
  EXPLAIN: Promise
  BODY: |
    ■ Promise ~ then

    const promise = new Promise((resolve, reject)=>{
      const ok = true
      if (ok) resolve(someData)
      else reject(new Error('errorMessage'))
    })

    promise.then(
      (res)=>{ return res.data }
    ).catch(
      (err)=>{ return err } // 'errorMessage' がここに入る
    )

    ■ fetch API

      fetch(url).then(r => r.json())

    ■ Promise()

      new Promise(resolve => setTimeout(resolve, ms))

    ■ async ~ await

      async function getData() { return await fetch(url) }

    ■ fs.promises API (Nodejs)

      fs.promises.readFile(path, 'utf-8')

    ■ 動的 import 

      import('./module')

- ENTRY:
  EXPLAIN: Async/Await
  BODY: |
    ■ async/await 基本形【ES2017】

    ・catch / finally 内でも await は使用可能

    async function func(a){
      try{
        const val = await getProm();
        return val
      } catch(e){
        const fallback = await getFallback();
        return fallback
      } finally{
        await cleanup();
      }
    }

    ・上の関数を呼ぶ例 (Promise として扱う)

    func()
      .then(res => console.log(res))
      .catch(err => console.error(err))

    ・async 内で await して呼ぶ例

    (async () => {
      const res = await func();
      console.log(res)
    })()

- ENTRY:
  EXPLAIN: for await...of
  BODY: |
    ■ for await...of【ES2018】 (async generator)

    ・async function* で yield する非同期イテレータを返す
    ・for await...of は非同期イテレータを消費、async function* がそれを返す
    ・通常の async function は Promise を1つ返すだけ
    ・待ちながら値を複数回返すには yield が必要

    async function* asyncRange(n) {
      for (let i = 0; i < n; i++) {
        await new Promise(r => setTimeout(r, 200));
        yield i;
      }
    }

    // スクリプト直下で await は書けないため、ここでは IIFE で async を包む
    (async () => {
      for await (const v of asyncRange(5)) {
        console.log('got', v);
      }
      console.log('done');
    })();

    ■ for await...of【ES2022】(Top-level await)

    ・ES2022 のモジュールではトップレベルで await 可能
    ・拡張子 .mjs や type="module" のときは以下でよい

    async function* asyncRange(n) {
      for (let i = 0; i < n; i++) {
        await new Promise(r => setTimeout(r, 200));
        yield i;
      }
    }

    // IIFE 不要
    for await (const v of asyncRange(5)) {
      console.log('got', v);
    }
    console.log('done');

    ■ for await...of (Symbol.asyncIterator)

    ・[Symbol.asyncIterator] 
      ・async next() を返すオブジェクトも for await...of で扱える
    ・トップレベルで使う場合は IIFE で包むか、モジュールで top-level await を使う

    const asyncIterable = {
      [Symbol.asyncIterator]() {
        let i = 0;
        return {
          async next() {
            if (i < 3) {
              await new Promise(r => setTimeout(r, 300));
              return { value: `value-${i++}`, done: false };
            }
            return { done: true };
          }
        };
      }
    };

    (async () => {
      for await (const x of asyncIterable) {
        console.log(x);
      }
      console.log('finished');
    })();

- ENTRY:
  EXPLAIN: テスト用 delay 関数
  BODY: |
    ■ n 秒後に成功/失敗を返すテスト用 Promise

    function delay<T>(
      ms: number,              // 待ち時間(ミリ秒)
      value: T | null = null,  // 成功時に resolve で返す値(省略時は null)
      rejectError?: unknown    // 渡すと ms 経過後に reject(rejectError) (省略時は resolve)
    ): Promise<T | null> {     // 成功時は value の型(reject 時 catch で受け取る)
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (rejectError !== null && rejectError !== undefined) {
            console.log("in: rejected")
            reject(rejectError)
          }
          else {
            console.log("in: resolved")
            resolve(value)
          }
        }, ms)
      })
    }

    delay(500).then(() => console.log('0.5s later'))
    delay(1000, { id: 1 }).then(data => console.log(data))
    delay(500, null, new Error('fail')).catch(err => console.error(err))

- ENTRY:
  EXPLAIN: Promise.all【ES2015】
  BODY: |
    ■ 概要

    ・全成功 -> 成功
    ・複数の非同期を並列実行し、全て完了してから結果をまとめる
    ・1つでも reject されると全体が reject
    ・全員が fulfill したときだけ then の引数に配列が渡る

    ■ シグネチャ

    Promise.all([promise1, promise2, ...])
      .then((result) => console.log("result:", result))
      .catch(err => console.error(err))  // err: unknown

    ■ テスト(失敗, 成功)

    const promise1 = delay(100, '成功')
    const promise2 = delay(50, null, new Error('error'))

    [LOG]: 50,  "rejected" 
    [ERR]: error
    [LOG]: 100,  "resolved" 

    ■ テスト(成功, 失敗)

    const promise1 = delay(50, '成功')
    const promise2 = delay(100, null, new Error('error'))

    [LOG]: 50,  "resolved" 
    [LOG]: 100,  "rejected" 
    [ERR]: error

    ■ テスト(成功, 成功)

    const promise1 = delay(50, '成功')
    const promise2 = delay(100, '成功')

    [LOG]: 50,  "resolved" 
    [LOG]: 100,  "resolved" 
    [LOG]: "result:",  ["成功", "成功"]

    ■ テスト(失敗, 失敗)

    const promise1 = delay(50, null, new Error('error'))
    const promise2 = delay(100, null, new Error('error'))

    [LOG]: 50,  "rejected" 
    [ERR]: error 
    [LOG]: 100,  "rejected"

- ENTRY:
  EXPLAIN: Promise.race【ES2015】
  BODY: |
    ■ 概要

    ・複数の Promise のうち、最初に settle(fulfill または reject) した結果がそのまま返る
    ・残りはそのまま実行されるが、race の結果には影響しない
    ・タイムアウト実装や「いずれか1つでよい」場合に使う

    ■ シグネチャ

    Promise.race([promise1, promise2, ... ])
      .then((result) => console.log("result:", result))
      .catch(err => console.error(err))  // err: unknown

    ■ テスト(失敗, 成功)

    const promise1 = delay(100, '成功')
    const promise2 = delay(50, null, new Error('error'))

    [LOG]: 50,  "rejected" 
    [ERR]: error 
    [LOG]: 100,  "resolved" 

    ■ テスト(成功, 失敗)

    const promise1 = delay(50, '成功')
    const promise2 = delay(100, null, new Error('error'))

    [LOG]: 50,  "resolved" 
    [LOG]: "result:",  "成功" 
    [LOG]: 100,  "rejected" 

    ■ テスト(成功, 成功)

    const promise1 = delay(50, '成功')
    const promise2 = delay(100, '成功')

    [LOG]: 50,  "resolved" 
    [LOG]: "result:",  "成功" 
    [LOG]: 100,  "resolved" 

    ■ テスト(失敗, 失敗)

    const promise1 = delay(50, null, new Error('error'))
    const promise2 = delay(100, null, new Error('error'))

    [LOG]: 50,  "rejected" 
    [ERR]: error 
    [LOG]: 100,  "rejected"

- ENTRY:
  EXPLAIN: Promise.allSettled【ES2020】
  BODY: |
    ■ 概要

    ・全 Promise が settle(fulfill または reject) するまで待ち、結果の配列を返す
    ・1つでも reject しても全体は reject せず、全結果取得
    ・各要素は { status: 'fulfilled', value }
       または { status: 'rejected', reason }

    ■ シグネチャ

    Promise.allSettled([ promise1, promise2, ... ])
      .then((result) => console.log(result))

      ※ then のみで完結し、catch は不要(全体が reject しないため)

    ■ テスト(失敗, 成功)

    const promise1 = delay(100, '成功')
    const promise2 = delay(50, null, new Error('error'))

    [LOG]: 50,  "rejected" 
    [LOG]: 100,  "resolved" 
    [LOG]: [{
      "status": "fulfilled",
      "value": "成功"
    }, {
      "status": "rejected",
      "reason": {}
    }] 

    ■ テスト(成功, 失敗)

    const promise1 = delay(50, '成功')
    const promise2 = delay(100, null, new Error('error'))

    [LOG]: 50,  "resolved" 
    [LOG]: 100,  "rejected" 
    [LOG]: [{
      "status": "fulfilled",
      "value": "成功"
    }, {
      "status": "rejected",
      "reason": {}
    }] 

    ■ テスト(成功, 成功)

    const promise1 = delay(50, '成功')
    const promise2 = delay(100, '成功')

    [LOG]: 50,  "resolved" 
    [LOG]: 100,  "resolved" 
    [LOG]: [{
      "status": "fulfilled",
      "value": "成功"
    }, {
      "status": "fulfilled",
      "value": "成功"
    }] 

    ■ テスト(失敗, 失敗)

    const promise1 = delay(50, null, new Error('error'))
    const promise2 = delay(100, null, new Error('error'))

    [LOG]: 50,  "rejected" 
    [LOG]: 100,  "rejected" 
    [LOG]: [{
      "status": "rejected",
      "reason": {}
    }, {
      "status": "rejected",
      "reason": {}
    }]

- ENTRY:
  EXPLAIN: Promise.any【ES2021】
  BODY: |
    ■ 概要

    ・複数の Promise のうち、最初に fulfill した値がそのまま返る
    ・race は「最初に settle」だが、any は「最初に fulfill」のみ採用
    ・全て reject した場合は AggregateError(errors 配列付き) で reject

    ■ シグネチャ

    Promise.any([ promise1, promise2, ... ])
      .then((result) => console.log("result:", result))
      .catch(err => console.error(err.errors)) 

    ※ 1つでも fulfill すれば then、全員 reject なら AggregateError
    ※ 中身を見るには err.errors を参照

    ■ テスト(失敗, 成功)

    const promise1 = delay(100, '成功')
    const promise2 = delay(50, null, new Error('error'))

    [LOG]: 50,  "rejected" 
    [LOG]: 100,  "resolved" 
    [LOG]: "result:",  "成功" 

    ■ テスト(成功, 失敗)

    const promise1 = delay(50, '成功')
    const promise2 = delay(100, null, new Error('error'))

    [LOG]: 50,  "resolved" 
    [LOG]: "result:",  "成功" 
    [LOG]: 100,  "rejected" 

    ■ テスト(成功, 成功)

    const promise1 = delay(50, '成功')
    const promise2 = delay(100, '成功')

    [LOG]: 50,  "resolved" 
    [LOG]: "result:",  "成功" 
    [LOG]: 100,  "resolved" 

    ■ テスト(失敗, 失敗)

    const promise1 = delay(50, null, new Error('error'))
    const promise2 = delay(100, null, new Error('error'))

    [LOG]: 50,  "rejected" 
    [LOG]: 100,  "rejected" 
    [ERR]: [error, error]

