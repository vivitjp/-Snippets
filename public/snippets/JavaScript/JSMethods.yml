# Module
# ----------------------------
- ENTRY:
  CATEGORY: Module

- ENTRY:
  EXPLAIN: Module import
  BODY: |
    ■ import の種類【ES2015】

    ・副作用のみ(モジュールを実行するだけ)

    import './module.js'

    ・名前付き import

    import { foo, bar } from './module.js'

    ・名前を変えて import (as)

    import { foo as f, bar as b } from './module.js'

    ・名前空間としてまとめて import (* as)

    import * as M from './module.js'
    M.foo; M.bar

    ・デフォルト export を import

    import Def from './module.js'

    ・デフォルトと名前付きを同時に import

    import Def, { foo, bar } from './module.js'
    import Def, * as M from './module.js'

    ・動的 import【ES2020】 (Promise を返す。条件付き・遅延読み込み向け)

    const mod = await import('./module.js')
    import('./module.js').then(mod => { ... })

- ENTRY:
  EXPLAIN: Module export
  BODY: |
    ■ export の種類【ES2015】

    ・宣言と同時に export

    export const a = 1
    export let b = 2
    export function fn(){}
    export class C {}
    export default function def(){}

    ・既存の識別子をまとめて export

    export { foo, bar }
    export { foo as f, bar as b }

    ・デフォルト export (1モジュール1つ)

    export default expression
    export default function name(){}
    export default class Name {}

    ・他モジュールを再 export (転送)

    export { foo, bar } from './other.js'
    export * from './other.js'
    export { default } from './other.js'

# ----------------------------
# Class
# ----------------------------
- ENTRY:
  CATEGORY: Class

- ENTRY:
  EXPLAIN: Class
  BODY: |
    ■ 概要【ES2015】

    ・コンストラクタとプロトタイプをまとめた糖衣構文
    ・new でインスタンス化。typeof は "function"
    ・クラス本体は strict モードで実行される

    ■ クラス宣言とクラス式

    ・宣言 (ホイストされない。TDZ あり)
    class Foo { }

    ・名前付きクラス式 (クラス名は本体内でのみ参照可能)
    const Bar = class Bar { }

    ・匿名クラス式
    const Baz = class { }

    ■ constructor

    ・new 時に1回だけ実行される初期化メソッド
    ・省略時は空の constructor が暗黙に存在
    ・return でオブジェクトを返すとそれがインスタンスになる(通常は return しない)

    class Point {
      constructor(x, y) {
        this.x = x
        this.y = y
      }
    }
    const p = new Point(1, 2)

    ■ インスタンスプロパティ・メソッド

    ・constructor 内で this.xxx でプロパティを定義する従来のやり方
    ・クラスフィールド【ES2022】で this なしでプロパティを宣言可能(public)

    class C {
      count = 0
      constructor() {
        this.name = 'C'
      }
      increment() {
        this.count++
      }
    }

    ■ static (静的メソッド・静的プロパティ)

    ・インスタンスではなくクラス自身に属する
    ・static メソッド内の this はクラスを指す。インスタンスからは呼べない

    class Util {
      static version = '1.0'
      static create() {
        return new Util()
      }
    }
    Util.create()
    Util.version

    ■ get / set (アクセサ)

    ・プロパティのように見えるが関数で制御できる
    ・get のみで読み取り専用、set のみで書き込み専用も可能

    class Rect {
      constructor(w, h) {
        this._w = w
        this._h = h
      }
      get area() {
        return this._w * this._h
      }
      set width(v) {
        this._w = v
      }
    }

    ■ extends と super【ES2015】

    ・extends で継承。サブクラスの prototype はスーパークラスのインスタンス
    ・constructor 内で super() を必ず先に1回呼ぶ(this の初期化のため)。super 前に this 参照は不可
    ・メソッド内で super.メソッド名() でスーパークラスのメソッドを呼べる

    class Animal {
      constructor(name) {
        this.name = name
      }
      speak() {
        return this.name
      }
    }
    class Dog extends Animal {
      constructor(name, breed) {
        super(name)
        this.breed = breed
      }
      speak() {
        return super.speak() + ' barks'
      }
    }

    ■ プライベートフィールド【ES2022】

    ・# で始まる識別子はクラス内部からのみ参照可能
    ・# フィールドは constructor の外で宣言。this.#name で参照

    class Person {
      #name
      constructor(name) {
        this.#name = name
      }
      get name() {
        return this.#name
      }
    }
    const u = new Person('Alice')
    u.name
    u.#name

    ※ 最後の u.#name は SyntaxError(クラス外からはアクセス不可)

    ■ 注意点

    ・クラスは関数なので call/apply で this を変えて呼ぶと型が崩れる。通常は new 専用
    ・メソッドはプロトタイプに載る。アロー関数は使えない(インスタンスの this を束縛したい場合は constructor で this.fn = () => {} とする)
