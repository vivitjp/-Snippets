#-------------------------------
# DynamoDB
#-------------------------------
- ENTRY:
  EXPLAIN: 概要
  BODY: |
    ■ 概要

    ・AWSのフルマネージドNoSQLキーバリュー/ドキュメントDB
    ・サーバレス。容量・スループットの自動スケール
    ・単一桁ミリ秒の低レイテンシ、高可用・耐久性(マルチAZ)
    ・オンデマンドとプロビジョンドの2種のキャパシティモード

    ■ 作成

    ・テーブル名・プライマリキー(パーティションキー必須、ソートキー任意)を定義
    ・キャパシティモード選択(オンデマンド / プロビジョンド)
    ・コンソール / CLI / CloudFormation / SDK で作成可能

    ■ 注意

    ・プライマリキー設計がパフォーマンスとコストに直結
    ・アクセスパターンを先に検討
    ・プロビジョンドは未使用時も課金
    ・開発・低トラフィックはオンデマンド検討
    ・アイテムサイズ上限 400KB
    ・大容量はS3参照 + DynamoDBでメタ管理

    ■ スキーマ

    ・テーブル定義で決まるのはキースキーマ(パーティションキー・ソートキー)と LSI/GSI だけ
    ・RDB のような「全行で共通の列を強制する」スキーマはネイティブにはない
    ・アイテムごとに属性は可変(スキーマレス)
    ・スキーマありのように扱う場合: アプリ層でバリデーションする
    ・または Amplify の @model / GraphQL で型を定義しアプリ側で守る
    ・DynamoDB API 自体は列スキーマを定義・強制しない

- ENTRY:
  EXPLAIN: RDB(SQL)との違い
  BODY: |
    ■ データモデル・スキーマ

    ・DynamoDB

      ・スキーマレス
      ・テーブル定義はキー(パーティションキー・ソートキー)と LSI/GSI のみ
      ・アイテムごとに属性を自由に追加可能
      ・同一テーブル内で異なる「形」のアイテムを混在可能
      ・列(カラム)の概念はなく、属性名・型はアイテム単位

    ・RDB(SQL)

      ・スキーマ固定
      ・CREATE TABLE で列名・型・NOT NULL 等を定義
      ・全行が同じ列構造
      ・ALTER でスキーマ変更は可能だが、全行に適用
      ・正規化(複数テーブルに分割)が基本

    ■ クエリ・アクセスパターン

    ・DynamoDB

      ・GetItem: プライマリキー指定で 1 アイテム取得
      ・Query: パーティションキー必須、同一パーティション内でソートキー条件・フィルタ可能
      ・Scan: テーブル全体を走査(非推奨、コスト・遅延が大きい)
      ・「どのキーでどう読むか」を先に決める設計が必須
      ・任意の列での柔軟な WHERE は苦手

    ・RDB(SQL)

      ・SELECT で任意の列を指定
      ・WHERE で任意の列に対する条件・複合条件が書ける
      ・複数テーブルを JOIN して横断的に取得可能
      ・フルテーブルスキャンもインデックスを使った範囲検索も同じ SQL で表現

    ■ JOIN とリレーション

    ・DynamoDB

      ・JOIN は存在しない
      ・リレーションは「アプリ側で複数回 GetItem/Query する」「denormalize して 1 アイテムに含める」で表現
      ・1 対多はソートキーで範囲 Query、多対多は中間テーブル的なアイテム設計や GSI で対応

    ・RDB(SQL)

      ・JOIN(INNER/LEFT/RIGHT/FULL)で複数テーブルを結合して 1 結果セットに
      ・外部キー制約で参照整合性を DB が保証可能
      ・正規化されたテーブルをそのまま横断検索できる

    ■ 集計・集約

    ・DynamoDB

      ・COUNT は Query/Scan の返却件数で取得可能
      ・SUM/AVG/MAX/MIN 等の集約関数はネイティブにはなし
      ・集計はアプリ側で取得データを集計するか、Athena/EMR/Redshift 等にエクスポートして SQL で集計
      ・大規模集計は DynamoDB 単体では向かず、ストリーム＋Lambda で集計テーブルを更新するパターンあり

    ・RDB(SQL)

      ・SUM/AVG/COUNT/MAX/MIN や GROUP BY が標準
      ・1 クエリで集計結果を取得可能
      ・ウィンドウ関数やサブクエリで複雑な集計も記述可能

    ■ トランザクション

    ・DynamoDB

      ・TransactWriteItems / TransactGetItems で複数アイテムの読み書きを「全成功 or 全ロールバック」で実行可能
      ・最大 100 アイテム
      ・ACID はトランザクション単位で保証
      ・従来の RDB のような「複数ステートメントにまたがる長時間トランザクション」は想定していない

        ※ ACID:
          ・Atomicity(原子性):   トランザクションは全て成功するか全て取り消されるかどちらか
          ・Consistency(一貫性): トランザクション後も制約・整合性が保たれる
          ・Isolation(分離性):   他トランザクションの未確定な変更から隔離される
          ・Durability(耐久性):  コミットした結果は障害後も失われない

    ・RDB(SQL)

      ・BEGIN / COMMIT / ROLLBACK でトランザクション境界を明示
      ・ロックや分離レベルで同時実行制御。複雑な多表更新や長時間トランザクションに強い

    ■ スケーリング・パーティション

    ・DynamoDB

      ・水平スケールが基本。パーティションキーでデータを分散
      ・スループットはパーティション単位で割り当て
      ・ホットパーティション(特定キーにアクセス集中)を避けるキー設計が重要
      ・オンデマンドならスパイクに自動対応
      ・プロビジョンドは RCU/WCU を事前設定

    ・RDB(SQL)

      ・垂直スケール(インスタンスの大型化)やレプリカ追加が一般的
      ・シャーディングする場合はアプリ or ミドルウェアで分割
      ・RDS はマネージドだが自動水平分割は限定的

    ■ インデックス

    ・DynamoDB

      ・LSI: 同一パーティションキー内で別ソートキーでの Query 用(テーブル作成時のみ追加可能)
      ・GSI: 別パーティションキー(＋任意でソートキー)で Query 可能(後から追加・削除可能)
      ・「クエリしたいキーの組み合わせ」ごとに GSI を設計
      ・インデックス数・項目は制限あり

    ・RDB(SQL)

      ・任意の列(または列の組み合わせ)にインデックスを作成可能
      ・B-tree 等で範囲検索・ソートに利用
      ・複合インデックスの順序で効く検索が変わる
      ・インデックスが多くてもスキーマ上は 1 テーブル

    ■ 制約・制限(代表例)

    ・DynamoDB

      ・1 アイテム最大 400KB
      ・プライマリキーは必須
      ・キー以外の一意制約はアプリ側で担保
      ・大量の書き込みは BatchWriteItem(MAX 25 件)の繰り返し

    ・RDB(SQL)

      ・行サイズは RDBMS による(数 KB 〜 MB オーダーなど)
      ・UNIQUE / PRIMARY KEY / FOREIGN KEY で制約を宣言可能
      ・バルク INSERT や UPSERT が標準で用意されていることが多い

    ■ 選び分けの目安

    ・DynamoDB が向く例

      ・アクセスパターンがほぼ決まっている(キーで引く・範囲で取る)
      ・高スループット・低レイテンシが欲しい
      ・スキーマを後から柔軟に変えたい
      ・サーバレスで運用コストを抑えたい

    ・RDB(SQL)が向く例

      ・複雑な JOIN・サブクエリ・集計を 1 クエリで表現したい
      ・参照整合性を DB 層で強く保ちたい
      ・アドホックな検索(任意の列での WHERE)が多い
      ・既存の SQL 資産やツール(BI 等)との親和性を重視する場合

- ENTRY:
  EXPLAIN: 作成ツール
  BODY: |
    ■ コンソール

    ・DynamoDB
      → テーブル
      → テーブルの作成
        ・テーブル名・パーティションキー(必須)・ソートキー(任意)・キャパシティを入力

      例:
      ・テーブル名: MyTable                // テーブル名は一意である必要がある
      ・パーティションキー: id              // 必須
      ・ソートキー: なし                   // 任意
      ・キャパシティ: オンデマンド          // オンデマンド/プロビジョンド
      ・キャパシティモード: オンデマンド     // オンデマンド/プロビジョンド

    ■ CLI

    ・create-table でテーブル名・キースキーマ・キャパシティを指定

      aws dynamodb create-table \
        --table-name MyTable \
        --attribute-definitions AttributeName=id,AttributeType=S \
        --key-schema AttributeName=id,KeyType=HASH \
        --billing-mode PAY_PER_REQUEST

    ■ CloudFormation

    ・AWS::DynamoDB::Table でテーブル定義。DeletionPolicy で削除保護も可能

      MyTable:
        Type: AWS::DynamoDB::Table
        Properties:
          TableName: MyTable
          BillingMode: PAY_PER_REQUEST
          AttributeDefinitions:
            - AttributeName: id
              AttributeType: S
          KeySchema:
            - AttributeName: id
              KeyType: HASH

    ■ SDK (Node.js)

    ・DynamoDBClient と CreateTableCommand で作成

      import { DynamoDBClient, CreateTableCommand } from '@aws-sdk/client-dynamodb';

      const client = new DynamoDBClient({});
      await client.send(new CreateTableCommand({
        TableName: 'MyTable',
        AttributeDefinitions: [{ AttributeName: 'id', AttributeType: 'S' }],
        KeySchema: [{ AttributeName: 'id', KeyType: 'HASH' }],
        BillingMode: 'PAY_PER_REQUEST',
      }));

- ENTRY:
  EXPLAIN: 予約語
  BODY: |
    ■ 概要

    ・式で属性名に使うと衝突する語がある
    ・KeyConditionExpression / ConditionExpression / UpdateExpression 等
    ・衝突時は #プレースホルダ と ExpressionAttributeNames でエイリアスを渡す
    ・大文字小文字は区別なし
    ・例: name, type, value, date, key, count, status, data, comment, order, group, 
          user, item, number, end, from, to, ... 500語以上

    ■ 予約語の name がどこで使われているか

    ・DynamoDB の式の構文では "name" はキーワードとして使われていない
    ・SQL の ORDER BY の ORDER のように、式の文法のどこかに name という語が登場するわけではない
    ・予約語リストに "name" が載っているだけ
    ・式をパースするとき、属性名として書かれた語がそのリストに含まれるかチェックする
    ・含まれていれば「予約語なので属性名としては使えない」とエラーにする
    ・つまり "name" が使われているのは、そのチェック時のリスト参照だけ。構文上のキーワードではない

    ■ 予約語を回避する方法

    ・UpdateExpression で属性 name を更新するとき
      ・"SET name = :val" はエラー
      ・"SET #n = :val" と ExpressionAttributeNames: { '#n': 'name' } で回避
    ・ConditionExpression で属性 type を条件にするとき
      ・"type = :t" はエラー
      ・"#t = :t" と ExpressionAttributeNames: { '#t': 'type' } で回避
    ・ProjectionExpression で属性 value だけ返すとき
      ・"value" はエラー
      ・"#v" と ExpressionAttributeNames: { '#v': 'value' } で回避

    ■ 例(UpdateItem で name を更新)

    UpdateExpression: 'SET #n = :name',
    ExpressionAttributeNames: { '#n': 'name' },
    ExpressionAttributeValues: marshall({ ':name': '新しい名前' }),

- ENTRY:
  EXPLAIN: RCU & WCU
  BODY: |
    ■ 概要

    ・プロビジョンドキャパシティモードでテーブル・インデックスに割り当てるスループット単位
    ・オンデマンドモードでは RCU/WCU を事前に設定しない(使用量に応じて課金)

    ■ RCU(Read Capacity Unit)

    ・1 RCU = 1秒あたり 4KB までの強力整合性読み取り 1回、または 8KB までの結果整合性読み取り 1回
    ・アイテムサイズが 4KB を超えると複数 RCU を消費
    ・結果整合性読み取りは同じアイテムでも強力整合性の約半分の RCU

    ■ WCU(Write Capacity Unit)

    ・1 WCU = 1秒あたり 1KB までの書き込み 1回
    ・アイテムサイズが 1KB を超えると複数 WCU を消費
    ・1回の PutItem / UpdateItem / DeleteItem が 1 アイテム分の WCU を消費

    ■ プロビジョンド時の設計

    ・ピーク時の読み書きレートを見積もり、RCU/WCU を設定
    ・不足すると ThrottlingException が返りリトライが必要
    ・オートスケーリングで負荷に応じて RCU/WCU を増減可能

- ENTRY:
  EXPLAIN: Consistent(整合性)
  BODY: |
    ■ 概要

    ・DynamoDB の「読み取り」には「結果整合性」と「強力整合性」の2種類
    ・デフォルトは結果整合性
    ・強力整合性には GetItem / Query / Scan で ConsistentRead: true 指定

    ■ 結果整合性(Eventually Consistent Read)

    ・デフォルトの読み取りモデル
    ・直前に完了した書き込みが反映されていない応答が返る場合がある(古いデータが返る可能性)
    ・通常 1 秒以内にレプリカ間で反映される
    ・消費する読み取りキャパシティは強力整合性の約半分(同じアイテム取得でも RCU が少ない)
        ※ RCU: Read Capacity Unitが少ない利点
                ・読み取りコストが低くなる
                ・読み取りスループットが高くなる
                ・読み取りレイテンシが低くなる
        ※ WCU: Write Capacity Unitが多いデメリット
                ・書き込みコストが高くなる
                ・書き込みスループットが低くなる
                ・書き込みレイテンシが高くなる
    ・結果整合性の方がコストが安くなる
    ・テーブル・LSI・GSI のいずれでも利用可能
        ※ LSI: Local Secondary Indexの略
        ※ GSI: Global Secondary Indexの略

    ■ 強力整合性(Strongly Consistent Read)

    ・その時点までに成功した書き込みがすべて反映された最新のデータが返る
    ・GetItem / Query / Scan で ConsistentRead: true を指定で強力整合性
    ・テーブルと LSI のみサポート
    ・GSI と DynamoDB Streams では指定不可
    ・結果整合性より遅延が大きくなる場合があり、消費 RCU も約2倍

    ■ なぜ2種類あるか

    ・DynamoDB はマルチ AZ で複数レプリカにデータ複製
    ・結果整合性: いずれかのレプリカから読み取るため応答が速い
                 -> 書き込み直後の反映遅れを許容
    ・強力整合性: プライマリレプリカなど最新が確定したレプリカから読む
                 -> 書き込み反映を保証する代わりにレイテンシ・コスト増加

    ■ 使い分け

    ・結果整合性でよい例:

      一覧表示、集計、キャッシュの更新、書き込み直後の同一データ取得が必須

    ・強力整合性を使う例:

      残高確認、在庫引き当て、二重送信防止など「必ず最新を読む」必要

    ■ SDK での指定例

    GetItemCommand / QueryCommand / ScanCommand の引数で ConsistentRead: true を付ける
    const result = await client.send(new GetItemCommand({
      TableName: 'Users',
      Key: marshall({ userId: 'U001' }),
      ConsistentRead: true,
    }));

- ENTRY:
  EXPLAIN: スロットリング
  BODY: |
    ■ 概要

    ・プロビジョンドモードで割り当てた RCU/WCU を超えるとスロットリングが発生
    ・API が ThrottlingException(旧名 ProvisionedThroughputExceededException) を返す
    ・オンデマンドでも一時的な急増時にはスロットリングが起こり得る
    ・スループット関連で遭遇する機会が最も多いエラー

    ■ 主な原因

    ・プロビジョンドの RCU/WCU 不足
      ・ピーク時の読み書きが設定値を上回る
      ・見積もりが低い、または負荷増加後の見直し不足
    ・ホットパーティション
      ・特定のパーティションキーにだけアクセスが集中
      ・1パーティションに割り当てられるスループットには上限あり
      ・均等に分散されないキー設計やアクセスパターンで発生しやすい
    ・GSI/LSI のスループット不足
      ・テーブル本体は足りていても、インデックス側のプロビジョンドが不足するとスロットリング
    ・バースト後のオンデマンド制限
      ・オンデマンドはバースト許容ありだが、極端なスパイク時は制限に当たる場合あり

    ■ 対処

    ・リトライと指数バックオフ
      ・ThrottlingException は一時的な過負荷なので、遅延を挟んでリトライする
      ・指数バックオフでリトライ間隔を徐々に伸ばすと成功率が上がる
      ・SDK のデフォルトリトライや jitter 付きバックオフの利用を推奨
    ・プロビジョンドの見直し
      ・CloudWatch の ConsumedReadCapacityUnits / ConsumedWriteCapacityUnits と設定値を比較
      ・オートスケーリングで目標使用率に合わせて RCU/WCU を自動増減
    ・アクセスパターンとキー設計の見直し
      ・ホットパーティションを避けるため、パーティションキーを分散させる(サフィックス/シャード)
      ・読み書きを複数パーティションに分散するように設計
    ・オンデマンドへの切り替え検討
      ・負荷が変動しやすく見積もりが難しい場合はオンデマンドでスパイクに任せる選択肢あり

    ■ 補足

    ・エラー名は SDK/API バージョンにより ThrottlingException または ProvisionedThroughputExceededException
    ・メトリクスでは UserErrors や ThrottledRequests でスロットリング件数を確認可能

#-------------------------------
# データ構造
#-------------------------------

- ENTRY:
  CATEGORY: データ構造

- ENTRY:
  EXPLAIN: テーブル
  BODY: |
    ■ 概要

    ・アイテムの集合
    ・名前はリージョン内で一意
    ・パーティションキー(必須)とソートキー(任意)で一意性を保証

    ■ 例(パーティションキーのみ)

    import { DynamoDBClient, CreateTableCommand } from '@aws-sdk/client-dynamodb';

    const client = new DynamoDBClient({});
    await client.send(new CreateTableCommand({
      TableName: 'Users',
      AttributeDefinitions: [{ AttributeName: 'userId', AttributeType: 'S' }],
      KeySchema: [{ AttributeName: 'userId', KeyType: 'HASH' }],
      BillingMode: 'PAY_PER_REQUEST',
    }));

    ■ 例(パーティション＋ソートキー)

    import { DynamoDBClient, CreateTableCommand } from '@aws-sdk/client-dynamodb';

    await client.send(new CreateTableCommand({
      TableName: 'Orders',
      AttributeDefinitions: [
        { AttributeName: 'userId', AttributeType: 'S' },
        { AttributeName: 'orderId', AttributeType: 'S' },
      ],
      KeySchema: [
        { AttributeName: 'userId', KeyType: 'HASH' },
        { AttributeName: 'orderId', KeyType: 'RANGE' },
      ],
      BillingMode: 'PAY_PER_REQUEST',
    }));

    ■ テーブル/LSI/GSI 比較

    ・テーブル

      ・メインのデータ格納先
      ・プライマリキー(パーティションキー必須、ソートキー任意)で一意
      ・Query / GetItem の対象

    ・LSI (Local Secondary Index)

      ・テーブルと同一パーティションキーだが、ソートキーだけ別定義
      ・テーブル作成時にのみ追加可能(後から追加不可)
      ・強力整合性読み取り可能(ConsistentRead: true)
      ・ストレージはベーステーブルと共有

    ・GSI (Global Secondary Index)

      ・パーティションキーとソートキーをテーブルと異なる組み合わせで定義可能
      ・テーブル作成後でも追加可能
      ・強力整合性読み取りは不可(結果整合性のみ)
      ・独自ストレージ、プロビジョンド時は別途 RCU/WCU

    ・使い分け

      ・同一パーティションで別ソートキーでの検索 → LSI
      ・別パーティションキーやテーブル作成後のインデックス追加 → GSI

- ENTRY:
  EXPLAIN: アイテム
  BODY: |
    ■ 概要

    ・テーブル内の1レコード
    ・プライマリキーで一意
    ・属性の集合
    ・最大 400KB

    ※ SQLとの違いに注意:
       レコードに定型属性がないので、挿入するデータ構造はレコードごとに異なってもOK

    ■ 例(PutItemCommand で1アイテム投入)

    import { DynamoDBClient, PutItemCommand } from '@aws-sdk/client-dynamodb';
    import { marshall } from '@aws-sdk/util-dynamodb';

    const client = new DynamoDBClient({});

    await client.send(new PutItemCommand({
      TableName: 'Users',
      Item: marshall({ userId: 'U001', name: '田中', createdAt: '2024-01-01' }),
    }));

    // 同じテーブルに、属性の違う別アイテムを投入可能(スキーマレス)。キーが違うので両方残る
    await client.send(new PutItemCommand({
      TableName: 'Users',
      Item: marshall({ userId: 'U002', address: '東京', createdAt: '2024-01-01' }),
    }));

- ENTRY:
  EXPLAIN: 属性
  BODY: |
    ■ 概要

    ・アイテムを構成する名前と値のペア
    ・スキーマ固定なし(アイテムごとに属性可変可)
    ・型: 
          S         文字列 (String)
          N         数値 (Number)
          B         バイナリ (Binary)
          BOOL      真偽値 (Boolean)
          NULL      null (Null)
          M         マップ (Map)
          L         リスト (List: JSONの配列)
          SS        文字列集合 (String Set)
          NS        数値集合 (Number Set)
          BS        バイナリ集合 (Binary Set)

    ■ marshall 

    ・JavaScript オブジェクト → DynamoDB 形式に変換

    import { marshall } from '@aws-sdk/util-dynamodb';

    const item = marshall({
      userId: 'U001',
      name: '田中',
      score: 100,
      tags: ['front', 'back'],
    });

    ※ DynamoDB 形式 => { 
      userId: { S: 'U001' },
      name: { S: '田中' },
      score: { N: '100' },
      tags: { SS: ['front', 'back'] }
    }

- ENTRY:
  EXPLAIN: キー
  BODY: |
    ■ 概要

    ・パーティションキー(HASH): 必須

      ・パーティションの決定に使用
      ・GetItem・Query で指定
      ※「パーティション」キーと呼ぶ理由
      ・値のハッシュで格納先パーティション(物理シャード)が決まるため
      ・RDBの主キーは一意・インデックスが目的
      ・DynamoDBでは「どのパーティションに載せるか」が第一、そのキーでパーティションが決定

    ・ソートキー(RANGE): 任意

      ・同一パーティション内の並び・範囲指定に使用
      ・GetItem・Query で指定

    ■ 例(GetItemCommand / QueryCommand でキー指定)

    import { DynamoDBClient, GetItemCommand, QueryCommand } from '@aws-sdk/client-dynamodb';
    import { marshall } from '@aws-sdk/util-dynamodb';

    const client = new DynamoDBClient({});
    await client.send(new GetItemCommand({
      TableName: 'Users',
      Key: marshall({ userId: 'U001' }),
    }));

    await client.send(new QueryCommand({
      TableName: 'Orders',
      KeyConditionExpression: 'userId = :uid',
      ExpressionAttributeValues: marshall({ ':uid': 'U001' }),
    }));

- ENTRY:
  EXPLAIN: 値
  BODY: |
    ■ 概要

    ・属性の値。型に応じて S/N/B/BOOL/M/L/SS/NS/BS で格納
    ・日時は ISO8601 文字列や N(Unix時刻)が一般的

    ■ 例(unmarshall で DynamoDB 形式 → TS で扱うオブジェクト)

    import { DynamoDBClient, GetItemCommand, QueryCommand } from '@aws-sdk/client-dynamodb';
    import { unmarshall } from '@aws-sdk/util-dynamodb';

    const client = new DynamoDBClient({});
    const result = await client.send(new GetItemCommand({
      TableName: 'Users',
      Key: marshall({ userId: 'U001' }),
    }));

    const record = unmarshall({
      id: { S: 'U001' },
      name: { S: '田中' },
      score: { N: '100' },
      active: { BOOL: true },
    });
    // => { id: 'U001', name: '田中', score: 100, active: true }

- ENTRY:
  EXPLAIN: キー・スキーマ
  BODY: |
    ■ 概要

    ・テーブル作成時に定義
    ・AttributeDefinitions で型を宣言、KeySchema で HASH/RANGE を割り当て

    ■ 例(CreateTableCommand の AttributeDefinitions / KeySchema)

    import { CreateTableCommand } from '@aws-sdk/client-dynamodb';

    ・パーティションキーのみ(配列[1]なし)
    AttributeDefinitions: [
      { AttributeName: 'id', AttributeType: 'S' }
    ],
    KeySchema: [
      { AttributeName: 'id', KeyType: 'HASH' }
    ],

    ・パーティション＋ソートキー(配列[0]:パーティションキー, 配列[1]:ソートキー)
    AttributeDefinitions: [
      { AttributeName: 'userId', AttributeType: 'S' },
      { AttributeName: 'orderId', AttributeType: 'S' },
    ],
    KeySchema: [
      { AttributeName: 'userId', KeyType: 'HASH' },
      { AttributeName: 'orderId', KeyType: 'RANGE' },
    ],

- ENTRY:
  EXPLAIN: キャパシティモード
  BODY: |
    ■ 概要

    ・テーブル作成時に指定
    ・オンデマンド(PAY_PER_REQUEST): デフォルト
      ・読み書き量に応じて自動課金
      ・スパイクに強い (スパイク: 急なアクセス増)
      ・開発・変動負荷向け
    ・プロビジョンド(PROVISIONED)
      ・RCU/WCU を事前指定
      ・一定負荷・コスト見積もり向け
      ・未使用時も課金
        ・RCU(Read Capacity Unit): 1秒あたりの読み取り操作数
        ・WCU(Write Capacity Unit): 1秒あたりの書き込み操作数

    ■ 例(CreateTableCommand で BillingMode / ProvisionedThroughput 指定)

    import { CreateTableCommand } from '@aws-sdk/client-dynamodb';
    import { ProvisionedThroughput } from '@aws-sdk/client-dynamodb';
    import { BillingMode } from '@aws-sdk/client-dynamodb';

    await client.send(new CreateTableCommand({
      TableName: 'Users',
      AttributeDefinitions: [{ AttributeName: 'userId', AttributeType: 'S' }],
      KeySchema: [{ AttributeName: 'userId', KeyType: 'HASH' }],
      BillingMode: 'PAY_PER_REQUEST',        // オンデマンド
    }));  

    await client.send(new CreateTableCommand({
      TableName: 'Users',
      AttributeDefinitions: [{ AttributeName: 'userId', AttributeType: 'S' }],
      KeySchema: [{ AttributeName: 'userId', KeyType: 'HASH' }],
      BillingMode: 'PROVISIONED',            // プロビジョンド
      ProvisionedThroughput: {
        ReadCapacityUnits: 5,
        WriteCapacityUnits: 5,
      },
    }));

- ENTRY:
  EXPLAIN: キー属性の注意点
  BODY: |
    ■ 作成日、更新日

    ・RDB の MySQL では作成日・更新日などの自動更新が可能、DynamoDB では自動更新なし
    ・createdAt / updatedAt はアプリ側で付与
    ・PutItem 時に createdAt をセット、UpdateItem 時に updatedAt を SET
    ・型は文字列(ISO8601)や数値(Unix タイムスタンプ)で保持が一般的
    ・Amplify の @model では createdAt / updatedAt のスキーマ自動追加とバックエンドでの自動設定
