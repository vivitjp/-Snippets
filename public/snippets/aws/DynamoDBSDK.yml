#-------------------------------
# DynamoDB SDK
#-------------------------------

- ENTRY:
  CATEGORY: DynamoDB SDK

- ENTRY:
  EXPLAIN: メソッド一覧
  TABLE:
    OPTION:
      ALIGN:
        - left
        - left
        - left
      HAS_TITLE: true
      WIDTH:
        - 25%
        - 25%
    BODY: |
      コマンド名	API Operation	説明
      CreateTableCommand	CreateTable	新しいDynamoDBテーブルを作成
      DeleteTableCommand	DeleteTable	既存のDynamoDBテーブルを削除
      DescribeTableCommand	DescribeTable	DynamoDBテーブルの情報を取得

      QueryCommand	Query	特定の条件に基づいてアイテムをクエリ
      GetItemCommand	GetItem	テーブルから単一のアイテムを取得
      PutItemCommand	PutItem	テーブルに新しいアイテムを追加
      UpdateItemCommand	UpdateItem	既存のアイテムを更新
      DeleteItemCommand	DeleteItem	テーブルから単一のアイテムを削除
      ScanCommand	Scan	テーブル内のすべてのアイテムをスキャン

      BatchGetItemCommand	BatchGetItem	複数のアイテムを一括で取得
      BatchWriteItemCommand	BatchWriteItem	複数のアイテムを一括で書き込み

- ENTRY:
  EXPLAIN: CreateTableCommand
  BODY: |
    ■ 概要

    ・新しいDynamoDBテーブルを作成

    ■ 引数(必須)

    ・TableName: string                              作成するテーブルの名前
    ・AttributeDefinitions: AttributeDefinition[]    テーブルの属性定義
        [{
          AttributeName: string
          AttributeType: string                      キーに使用する場合は S / N / B のいずれか
        }]

    ・KeySchema: KeySchemaElement[]                  テーブルのキースキーマ
        [{
          AttributeName: string
          KeyType: string                            HASH / RANGE
        }]

    ■ 引数(任意)

    ・BillingMode: BillingMode                       テーブルのキャパシティモード
        "PAY_PER_REQUEST"                            オンデマンド(デフォルト)
        "PROVISIONED"                                プロビジョンド(未使用時も課金)
    ・ProvisionedThroughput: ProvisionedThroughput   プロビジョンドキャパシティ設定(BillingMode: PROVISIONED 時)
    ・Tags: Tag[]                                    テーブルのタグ
    ・StreamSpecification: StreamSpecification       ストリームの設定
    ・SSESpecification: SSESpecification             サーバーサイド暗号化の設定
    ・DeletionProtectionEnabled: boolean             テーブル削除保護(true / false)
    ・TableClass: TableClass                         テーブルクラス(STANDARD / STANDARD_INFREQUENT_ACCESS)
    ・GlobalSecondaryIndexes: GlobalSecondaryIndex[] GSI 定義
    ・LocalSecondaryIndexes: LocalSecondaryIndex[]   LSI 定義
    ・OnDemandThroughput: OnDemandThroughput         オンデマンド最大読み書きユニット
    ・WarmThroughput: WarmThroughput                 ウォームスループット
    ・ResourcePolicy: string                         テーブル付与リソースポリシー

    ■ 戻り値(CreateTableCommandOutput)

    ・TableDescription: TableDescription             テーブル説明
      // TableDescription 内の主なプロパティ
      ・TableName: string                            テーブル名
      ・TableArn: string                             テーブルARN
      ・TableId: string                              テーブルID
      ・TableStatus: string                          状態(CREATING / ACTIVE 等)
      ・TableSizeBytes: number                       テーブルサイズ(バイト)
      ・ItemCount: number                            アイテム数
      ・CreationDateTime: number                     作成日時(UNIX エポック)
    ・$metadata: ResponseMetadata                    RequestId 等は $metadata.requestId で取得

    ■ サンプル(ユーザアカウント)

    import { CreateTableCommand } from '@aws-sdk/client-dynamodb';

    const command = new CreateTableCommand({
      TableName: 'Users',
      AttributeDefinitions: [{ AttributeName: 'userId', AttributeType: 'S' }],
      KeySchema: [{ AttributeName: 'userId', KeyType: 'HASH' }],
      BillingMode: 'PAY_PER_REQUEST',
    });

    const result = await client.send(command);
    {
      TableDescription: {
        TableName: 'Users',
        TableArn: 'arn:aws:dynamodb:ap-northeast-1:123456789012:table/Users',
        TableId: '123456789012',
        TableStatus: 'ACTIVE',
        TableSizeBytes: 100,
        ItemCount: 100,
        CreationDateTime: 1717777777,
      },
      $metadata: {
        requestId: '123456789012',
        httpStatusCode: 200,
        httpHeaders: {
          'content-type': 'application/json',
        },
        retryable: false,
      },
    }

    ■ サンプル(商品)

    テーブル: Products。パーティションキー productId、ソートキー category でカテゴリ別に取得可能

    await client.send(new CreateTableCommand({
      TableName: 'Products',
      AttributeDefinitions: [
        { AttributeName: 'productId', AttributeType: 'S' },
        { AttributeName: 'category', AttributeType: 'S' },
      ],
      KeySchema: [
        { AttributeName: 'productId', KeyType: 'HASH' },
        { AttributeName: 'category', KeyType: 'RANGE' },
      ],
      BillingMode: 'PAY_PER_REQUEST',
    }));

    商品1件の例(PutItemCommand で投入するアイテム):
    {
      productId: 'P001',
      category: 'electronics',
      name: 'ワイヤレスイヤホン',
      price: 3980,
      stock: 50,
      createdAt: '2024-01-15T00:00:00Z',
    }

- ENTRY:
  EXPLAIN: DeleteTableCommand
  BODY: |
    ■ 概要

    ・指定したDynamoDBテーブルを削除
    ・削除開始後はテーブルは DELETING 状態となり、完了まで DescribeTable で監視可能

    ■ 引数(必須)

    ・TableName: string                   削除するテーブル名/テーブルARN

    ■ 戻り値(DeleteTableCommandOutput)

    ・TableDescription: TableDescription  削除対象テーブルの説明(削除開始時点のメタデータ)
      // TableDescription 内の主なプロパティ
      ・TableName: string                 テーブル名
      ・TableArn: string                  テーブルARN
      ・TableId: string                   テーブルID
      ・TableStatus: string               状態(削除開始直後は DELETING)
      ・TableSizeBytes: number            テーブルサイズ(バイト)
      ・ItemCount: number                 アイテム数
      ・CreationDateTime: number          作成日時(UNIX エポック)
    ・$metadata: ResponseMetadata         RequestId 等は $metadata.requestId で取得

    ■ サンプル(ユーザテーブル削除)

    import { DeleteTableCommand } from '@aws-sdk/client-dynamodb';

    const command = new DeleteTableCommand({
      TableName: 'Users',
    });

    const result = await client.send(command);
    {
      TableDescription: {
        TableName: 'Users',
        TableArn: 'arn:aws:dynamodb:ap-northeast-1:123456789012:table/Users',
        TableId: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890',
        TableStatus: 'DELETING',  // 🔴削除中
        TableSizeBytes: 1024,
        ItemCount: 100,
        CreationDateTime: 1717777777,
        KeySchema: [
          { AttributeName: 'userId', KeyType: 'HASH' },
        ],
        AttributeDefinitions: [
          { AttributeName: 'userId', AttributeType: 'S' },
        ],
      },
      $metadata: {
        requestId: 'XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX',
        httpStatusCode: 200,
        httpHeaders: { 'content-type': 'application/x-amz-json-1.0' },
        retryable: false,
      },
    }

      ※ TableStatus が DELETING: 削除中、削除完了後は TableStatus: DELETED
      ※ DescribeTable で監視可能
      ※ requestId の用途は、エラー時のトラブルシューティングで使用

    ■ サンプル(商品テーブル削除)

    await client.send(new DeleteTableCommand({
      TableName: 'Products',
    }));

- ENTRY:
  EXPLAIN: DescribeTableCommand
  BODY: |
    ■ 概要

    ・指定したテーブルのメタデータ(スキーマ・ステータス・スループット等)を取得
    ・テーブル作成中(CREATING)や削除中(DELETING)の状態確認にも利用

    ■ 引数(必須)

    ・TableName: string                              対象テーブル名/テーブルARN

    ■ 戻り値(DescribeTableCommandOutput)

    ・Table: TableDescription                        テーブル説明(本体)
        .TableName: string                            テーブル名
        .TableArn: string                             テーブルARN
        .TableId: string                              テーブルID
        .TableStatus: string                          状態(CREATING / ACTIVE / UPDATING / DELETING 等)
        .TableSizeBytes: number                       テーブルサイズ(バイト)
        .ItemCount: number                            アイテム数
        .CreationDateTime: number                     作成日時(UNIX エポック)
        .KeySchema: KeySchemaElement[]                キースキーマ
        .AttributeDefinitions: AttributeDefinition[]  属性定義
        .GlobalSecondaryIndexes: []                   GSI 一覧
        .LocalSecondaryIndexes: []                    LSI 一覧
        .ProvisionedThroughput: {}                    プロビジョンド時は RCU/WCU 等
        .StreamSpecification: {}                      ストリーム設定(有効時)
    ・$metadata: ResponseMetadata  RequestId 等は $metadata.requestId で取得

    ■ サンプル(ユーザテーブル)

    import { DescribeTableCommand } from '@aws-sdk/client-dynamodb';

    const command = new DescribeTableCommand({
      TableName: 'Users',
    });

    const result = await client.send(command);
    {
      Table: {
        TableName: 'Users',
        TableArn: 'arn:aws:dynamodb:ap-northeast-1:123456789012:table/Users',
        TableId: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890',
        TableStatus: 'ACTIVE',
        TableSizeBytes: 1024,
        ItemCount: 100,
        CreationDateTime: 1717777777,
        KeySchema: [
          { AttributeName: 'userId', KeyType: 'HASH' },
        ],
        AttributeDefinitions: [
          { AttributeName: 'userId', AttributeType: 'S' },
        ],
        GlobalSecondaryIndexes: [],
        LocalSecondaryIndexes: [],
        ProvisionedThroughput: {
          ReadCapacityUnits: 5,
          WriteCapacityUnits: 5,
        },
        StreamSpecification: {},
        $metadata: {
          requestId: 'XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX',
          httpStatusCode: 200,
          httpHeaders: { 'content-type': 'application/x-amz-json-1.0' },
          retryable: false,
        },
      },
    }

    ■ サンプル(商品テーブル)

    await client.send(new DescribeTableCommand({
      TableName: 'Products',
    }));

- ENTRY:
  EXPLAIN: QueryCommand 複数取得
  BODY: |
    ■ 概要

    ・パーティションキーで同一キーを持つ(複数)アイテム取得
    ・ソートキー条件で範囲指定可能
    ・テーブル・LSI・GSI に対して実行可能
    ・FilterExpression はキー条件の後に適用され、取得件数には含まれるが返却はフィルタ後
    ・戻り値複数の配列
    ・1回の Query の戻り（結果セット）は最大 1MB まで
    ・LastEvaluatedKey が返ればページネーションで続きを取得

    ■ 引数(必須)

    ・TableName: string                   対象テーブル名またはテーブルARN
    ・KeyConditionExpression: string      パーティションキー等価必須、ソートキーは比較演算子で任意
        例: "userId = :uid"
        例: "userId = :uid AND category BETWEEN :cat1 AND :cat2"
    ・ExpressionAttributeValues: Record<string, AttributeValue>
                                          KeyConditionExpression 内の :name の実際の値
        { S: string }                     文字列
        { N: string }                     数値(ネットワーク上は文字列で送る)
        { B: Uint8Array }                 バイナリ(API は Base64。JS/TS SDK では Uint8Array)
        { BOOL: boolean }                 真偽値
        { NULL: true }                    null
        { M: Record<string, AttributeValue> }  マップ(ネスト属性)
        { L: AttributeValue[] }           リスト
        { SS: string[] }                  文字列集合
        { NS: string[] }                  数値集合(各要素は文字列)
        { BS: Uint8Array[] }              バイナリ集合(API は Base64 配列。SDK では Uint8Array[])

    ■ 引数(任意)

    ・ExpressionAttributeNames: Record<string, string>
                                          属性名のプレースホルダ(#name)。予約語対策
    ・FilterExpression: string            キー条件の後に適用するフィルタ(キー属性は不可)
    ・IndexName: string                   クエリ対象の LSI/GSI 名
    ・Limit: number                       評価する最大アイテム数(返却数は Filter 後で変動)
    ・ExclusiveStartKey: Record<string, AttributeValue>  
                                          前回の LastEvaluatedKey。ページネーション継続
    ・ScanIndexForward: boolean           true でソートキー昇順(デフォルト)、false で降順
    ・ConsistentRead: boolean             true で強力整合性(GSI では不可)
    ・ProjectionExpression: string        返却する属性のリスト
    ・ReturnConsumedCapacity: string      "NONE","TOTAL","INDEXES"

    ■ 戻り値(QueryCommandOutput) 全体

    ・Items: Item[]
        取得されたアイテムの配列。各要素は属性名をキー、AttributeValue を値とするオブジェクト
        AttributeValue の形は引数と同じ(上記いずれか1つ)
        ・{ S: string }  { N: string }  { B: Uint8Array }  { BOOL: boolean }  { NULL: true }
        ・{ M: Record<string, AttributeValue> }  { L: AttributeValue[] }  { SS: string[] }  { NS: string[] }  { BS: Uint8Array[] }

    ・Count: number
        FilterExpression 適用後に返却されたアイテム数

    ・ScannedCount: number
        FilterExpression 適用前に評価されたアイテム数。Filter なしなら Count と同一

    ・LastEvaluatedKey: Record<string, AttributeValue> | undefined
        今回返した最後のアイテムのプライマリキー。存在する場合は続きがあるため、次回 Query の ExclusiveStartKey に指定してページネーションする
        無い場合は全件取得済み

    ・ConsumedCapacity: ConsumedCapacity | undefined
        ReturnConsumedCapacity 指定時のみ返る。
        CapacityUnits: number
        ReadCapacityUnits: number
        WriteCapacityUnits: number
        Table: { CapacityUnits, ReadCapacityUnits, WriteCapacityUnits } | undefined
        TableName: string | undefined
        GlobalSecondaryIndexes: Record<string, { CapacityUnits, ReadCapacityUnits, WriteCapacityUnits }> | undefined
        LocalSecondaryIndexes: Record<string, { CapacityUnits, ReadCapacityUnits, WriteCapacityUnits }> | undefined

    ・$metadata: ResponseMetadata
        requestId, httpStatusCode, httpHeaders 等。

    ■ サンプル(ユーザテーブル・パーティションキーのみ)

    import { QueryCommand } from '@aws-sdk/client-dynamodb';
    import { marshall, unmarshall } from '@aws-sdk/util-dynamodb';

    const command = new QueryCommand({
      TableName: 'Users',
      KeyConditionExpression: 'userId = :uid',
      ExpressionAttributeValues: marshall({ ':uid': 'U001' }),
    });

    const result = await client.send(command);

    ■ サンプル(商品テーブル・パーティション＋ソートキー範囲)

    const result = await client.send(new QueryCommand({
      TableName: 'Products',
      KeyConditionExpression: 'productId = :pid AND category BETWEEN :cat1 AND :cat2',
      ExpressionAttributeValues: marshall({
        ':pid': 'P001',
        ':cat1': 'electronics',
        ':cat2': 'sports',
      }),
    }));

    ■ result の例(端折らず)

    {
      Items: [
        {
          productId: { S: 'P001' },
          category: { S: 'electronics' },
          name: { S: 'ワイヤレスイヤホン' },
          price: { N: '3980' },
          stock: { N: '50' },
          createdAt: { S: '2024-01-15T00:00:00Z' },
        },
        {
          productId: { S: 'P001' },
          category: { S: 'sports' },
          name: { S: 'ランニングシューズ' },
          price: { N: '8900' },
          stock: { N: '20' },
          createdAt: { S: '2024-01-16T00:00:00Z' },
        },
      ],
      Count: 2,
      ScannedCount: 2,
      LastEvaluatedKey: undefined,
      ConsumedCapacity: {
        TableName: 'Products',
        CapacityUnits: 0.5,
        ReadCapacityUnits: 0,
        WriteCapacityUnits: 0,
      },
      $metadata: {
        requestId: 'XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX',
        httpStatusCode: 200,
        httpHeaders: { 'content-type': 'application/x-amz-json-1.0' },
        retryable: false,
      },
    }

    ※ ページネーション時は LastEvaluatedKey が存在する限り、ExclusiveStartKey に設定して Query を繰り返す。

- ENTRY:
  EXPLAIN: GetItemCommand 単数取得
  BODY: |
    ■ 概要

    ・プライマリキーを指定して「1アイテム」取得
    ・該当アイテムが無い場合は Item が返らず(undefined)、エラーにはならない
    ・デフォルトは結果整合性読み取り
    ・ConsistentRead: true で強力整合性(データ整合性保証のため、読み取り完了まで待機)

    ■ 引数(必須)

    ・TableName: string                    対象テーブル名/テーブルARN
    ・Key: Record<string, AttributeValue>  取得するアイテムのプライマリキー
        パーティションキーのみのテーブル
          { 
            partitionKeyName: { S: "value" }   // パーティションキー(必須)
          }
        複合キー(パーティション＋ソート)のテーブル
          {
            partitionKeyName: { S: "value" },  // パーティションキー(必須)
            sortKeyName: { S: "value" }        // ソートキー(1件特定のため必須)
          }

    ■ 引数(任意)

    ・ProjectionExpression: string          返却する属性のみ指定
    ・ExpressionAttributeNames: Record<string, string> 属性名のプレースホルダ(#name)
    ・ConsistentRead: boolean               true で強力整合性(デフォルト false)
    ・ReturnConsumedCapacity: string        "NONE","TOTAL","INDEXES"

    ■ 戻り値(GetItemCommandOutput)

    ・Item: Record<string, AttributeValue> | undefined
        取得した1アイテム。キーに該当するアイテムが無い場合は undefined。
        各属性値は AttributeValue の形(S / N / B / BOOL / NULL / M / L / SS / NS / BS)。
    ・ConsumedCapacity: ConsumedCapacity | undefined
        ReturnConsumedCapacity 指定時のみ。CapacityUnits, TableName, Table 等。
    ・$metadata: ResponseMetadata
        requestId, httpStatusCode, httpHeaders 等。

    ■ サンプル(ユーザテーブル)

    import { GetItemCommand } from '@aws-sdk/client-dynamodb';
    import { marshall, unmarshall } from '@aws-sdk/util-dynamodb';

    const command = new GetItemCommand({
      TableName: 'Users',
      Key: marshall({ userId: 'U001' }),
    });

    const result = await client.send(command);
    const user = result.Item ? unmarshall(result.Item) : null;

    ■ サンプル(商品テーブル・複合キー)

    const result = await client.send(new GetItemCommand({
      TableName: 'Products',
      Key: marshall({ productId: 'P001', category: 'electronics' }),
    }));

    ■ result の例(アイテムあり)

    {
      Item: {
        productId: { S: 'P001' },
        category: { S: 'electronics' },
        name: { S: 'ワイヤレスイヤホン' },
        price: { N: '3980' },
        stock: { N: '50' },
        createdAt: { S: '2024-01-15T00:00:00Z' },
      },
      ConsumedCapacity: undefined,
      $metadata: {
        requestId: 'XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX',
        httpStatusCode: 200,
        httpHeaders: { 'content-type': 'application/x-amz-json-1.0' },
        retryable: false,
      },
    }

    ■ result の例(アイテムなし)

    {
      Item: undefined,
      ConsumedCapacity: undefined,
      $metadata: {
        requestId: 'XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX',
        httpStatusCode: 200,
        httpHeaders: { 'content-type': 'application/x-amz-json-1.0' },
        retryable: false,
      },
    }

- ENTRY:
  EXPLAIN: PutItemCommand 単数作成
  BODY: |
    ■ 概要

    ・指定したプライマリキーでアイテムを「1件」書き込む
    ・同一キーが既にあれば上書き(置換)
    ・新規作成と上書きの両方に使う
    ・存在時のみ上書き/未存在時のみ作成したい場合 ConditionExpression で制御

    ■ 引数(必須)

    ・TableName: string                        対象テーブル名または ARN
    ・Item: Record<string, AttributeValue>     書き込むアイテム、プライマリキー属性は必ず含める

    ■ 引数(任意)

    ・ConditionExpression: string              条件真のときだけ Put
                                               例: attribute_not_exists(userId) で存在しなければ作成
    ・ExpressionAttributeNames: Record<string, string>
                                               式内の属性名プレースホルダ(#name)
    ・ExpressionAttributeValues: Record<string, AttributeValue>
                                               式内の :name の値
    ・ReturnValues: string                     "NONE"(デフォルト),"ALL_OLD","ALL_NEW"
    ・ReturnConsumedCapacity: string           "NONE","TOTAL","INDEXES"

    ■ 戻り値(PutItemCommandOutput)

    ・Attributes: Record<string, AttributeValue> | undefined
        ReturnValues 指定時のみ
        ALL_OLD なら上書き前、ALL_NEW なら書き込み後のアイテム
    ・ConsumedCapacity: ConsumedCapacity | undefined
    ・ItemCollectionMetrics: ItemCollectionMetrics | undefined
    ・$metadata: ResponseMetadata

    ■ サンプル(ユーザ1件を投入)

    import { PutItemCommand } from '@aws-sdk/client-dynamodb';
    import { marshall } from '@aws-sdk/util-dynamodb';

    await client.send(new PutItemCommand({
      TableName: 'Users',
      Item: marshall({ userId: 'U001', name: '田中', createdAt: new Date().toISOString() }),
    }));

    ■ サンプル(存在しないときだけ Put)

    await client.send(new PutItemCommand({
      TableName: 'Users',
      Item: marshall({ userId: 'U002', name: '山田' }),
      ConditionExpression: 'attribute_not_exists(userId)',
    }));

- ENTRY:
  EXPLAIN: UpdateItemCommand 単数更新/単数作成
  BODY: |
    ■ 概要

    ・指定したプライマリキーのアイテムの属性を部分的に更新
    ・該当アイテムが無い場合は新規作成(upsert 動作)
    ・UpdateExpression で SET / REMOVE / ADD / DELETE を指定
    ・ConditionExpression で条件付き更新可能

    ■ 引数(必須)

    ・TableName: string                           対象テーブル名または ARN
    ・Key: Record<string, AttributeValue>         更新するアイテムのプライマリキー
    ・UpdateExpression: string                    更新内容。SET / REMOVE / ADD / DELETE 句の組み合わせ
        例: SET #n = :val                         "#" はプレースホルダのエイリアス
            REMOVE unusedAttr                     "unusedAttr" は属性名
            ADD score :inc                        ":inc" は式内の値
            DELETE tags :tagsToDel                ":tagsToDel" は式内の値

    ■ 引数(任意)

    ・ExpressionAttributeNames: Record<string, string>
                                                  属性名のプレースホルダ(#name)
    ・ExpressionAttributeValues: Record<string, AttributeValue>
                                                  式内の :name の値
    ・ConditionExpression: string                 真のときだけ更新
                                                  偽なら ConditionalCheckFailedException
    ・ReturnValues: string                        更新後の返却
                                                  "NONE","ALL_OLD","UPDATED_OLD","ALL_NEW","UPDATED_NEW"
    ・ReturnConsumedCapacity: string              "NONE","TOTAL","INDEXES"

    ■ 戻り値(UpdateItemCommandOutput)

    ・Attributes: Record<string, AttributeValue> | undefined
        ReturnValues 指定時のみ
        指定内容(ALL_OLD / UPDATED_OLD / ALL_NEW / UPDATED_NEW)のアイテム
    ・ConsumedCapacity: ConsumedCapacity | undefined
    ・ItemCollectionMetrics: ItemCollectionMetrics | undefined
        コレクション(LSI 付きテーブル)のサイズ情報
        ReturnItemCollectionMetrics 指定時のみ
    ・$metadata: ResponseMetadata

    ■ サンプル(ユーザの name を更新) ※ name は予約語

    import { UpdateItemCommand } from '@aws-sdk/client-dynamodb';
    import { marshall } from '@aws-sdk/util-dynamodb';

    await client.send(new UpdateItemCommand({
      TableName: 'Users',
      Key: marshall({ userId: 'U001' }),
      UpdateExpression: 'SET #n = :name',           // エイリアス #n を使って name を更新
      ExpressionAttributeNames: { '#n': 'name' },   // エイリアス #n = "name" と指定
      ExpressionAttributeValues: marshall({ ':name': '新しい名前' }),  // 更新値指定
    }));

    ■ エイリアス「#n」の使い方(ExpressionAttributeNames)

    ・UpdateExpression / ConditionExpression / KeyConditionExpression などでは
      属性名をそのまま書けるが、予約語や特殊文字を含む属性名は使えない
    ・「#」で始まるプレースホルダ(例: #n, #nm, #attr)を式の中に書き、
      ExpressionAttributeNames で「プレースホルダ → 実際の属性名」を対応
      ・属性名が name: UpdateExpression に "name" と直接書くと予約語でエラー
        そのため、#n = :val とし ExpressionAttributeNames: { '#n': 'name' } を渡す
      ・「:」で始まる名前(例、:name, :val) は ExpressionAttributeValues 用の値エイリアス
        属性「名」は #、値は : で区別
    ・同じ式内で複数属性を扱うときは #n, #c など別のプレースホルダを付け、
      ExpressionAttributeNames にそれぞれ定義する

    ■ サンプル(商品の在庫を減算・条件付き)

    await client.send(new UpdateItemCommand({
      TableName: 'Products',
      Key: marshall({ productId: 'P001', category: 'electronics' }),
      UpdateExpression: 'SET stock = stock - :qty',          // stock は非予約語なのでエイリアス不要
      ConditionExpression: 'stock >= :qty',
      ExpressionAttributeValues: marshall({ ':qty': 1 }),
      ReturnValues: 'ALL_NEW',
    }));

- ENTRY:
  EXPLAIN: DeleteItemCommand 単数削除
  BODY: |
    ■ 概要

    ・指定したプライマリキーのアイテムを1件削除
    ・該当アイテムが無い場合はエラーにならず正常終了
    ・ConditionExpression で条件付き削除可能（偽なら ConditionalCheckFailedException）

    ■ 引数(必須)

    ・TableName: string                           対象テーブル名または ARN
    ・Key: Record<string, AttributeValue>         削除するアイテムのプライマリキー

    ■ 引数(任意)

    ・ConditionExpression: string                 真のときだけ削除
    ・ExpressionAttributeNames: Record<string, string>
    ・ExpressionAttributeValues: Record<string, AttributeValue>
    ・ReturnValues: string                        "NONE"(デフォルト),"ALL_OLD"
    ・ReturnConsumedCapacity: string              "NONE","TOTAL","INDEXES"

    ■ 戻り値(DeleteItemCommandOutput)

    ・Attributes: Record<string, AttributeValue> | undefined
        ReturnValues: "ALL_OLD" 指定時のみ。削除前のアイテム
    ・ConsumedCapacity: ConsumedCapacity | undefined
    ・$metadata: ResponseMetadata

    ■ サンプル(ユーザ1件削除)

    import { DeleteItemCommand } from '@aws-sdk/client-dynamodb';
    import { marshall } from '@aws-sdk/util-dynamodb';

    await client.send(new DeleteItemCommand({
      TableName: 'Users',
      Key: marshall({ userId: 'U001' }),
    }));

    ■ サンプル(条件付き削除・存在するときだけ)

    await client.send(new DeleteItemCommand({
      TableName: 'Users',
      Key: marshall({ userId: 'U001' }),
      ConditionExpression: 'attribute_exists(userId)',
      ReturnValues: 'ALL_OLD',
    }));

- ENTRY:
  EXPLAIN: ScanCommand 全件取得
  BODY: |
    ■ 概要

    ・テーブル(または GSI)の全アイテムを走査
    ・キー条件なし
    ・Query と違いパーティションキー指定が不要
    ・全パーティションを読むため RCU 消費が大きい
    ・FilterExpression で取得後にフィルタ可能(評価したアイテム数は ScannedCount、返却数は Count)
    ・1回の戻り(結果セット)は最大 1MB
    ・LastEvaluatedKey でページネーション

    ・結果として返すもの

      ・Items: 走査でヒットしたアイテムの配列(Query と同様の形)
      ・Count: Filter 適用後の返却数。ScannedCount: 評価したアイテム数
      ・LastEvaluatedKey: 続きがあるときのみ。ページネーション用

    ・Query との違い

      ・Query: 1パーティションキー(+ソートキー条件)を指定し、そのパーティション内のアイテムだけ取得
      ・Scan: キー条件を指定しない。全パーティションを読んで、テーブル(または GSI)全体からアイテムを返す
      ・戻り値の形(Items, Count, LastEvaluatedKey)は似ているが、取得範囲が「1パーティション」か「テーブル全体」かが違う

    ■ 引数(必須)

    ・TableName: string                           対象テーブル名またはテーブル ARN

    ■ 引数(任意)

    ・FilterExpression: string                    取得後に適用するフィルタ
    ・ExpressionAttributeNames: Record<string, string>
    ・ExpressionAttributeValues: Record<string, AttributeValue>
    ・IndexName: string                           スキャン対象の GSI 名(LSI も指定可)
    ・Limit: number                               評価する最大アイテム数
    ・ExclusiveStartKey: Record<string, AttributeValue>
                                                  前回の LastEvaluatedKey
    ・Segment: number / TotalSegments: number     並列スキャン用(0 ～ TotalSegments-1 の Segment を割当)
    ・ProjectionExpression: string                返却する属性のリスト
    ・ConsistentRead: boolean                     true で強力整合性(GSI では不可)
    ・ReturnConsumedCapacity: string              "NONE","TOTAL","INDEXES"

    ■ 戻り値(ScanCommandOutput)

    ・Items: Item[]                               取得したアイテムの配列
    ・Count: number                               Filter 適用後の返却数
    ・ScannedCount: number                        評価したアイテム数
    ・LastEvaluatedKey: Record<string, AttributeValue> | undefined  続きがあるときのみ
    ・ConsumedCapacity: ConsumedCapacity | undefined
    ・$metadata: ResponseMetadata

    ■ サンプル(全件スキャン)

    import { ScanCommand } from '@aws-sdk/client-dynamodb';
    import { marshall, unmarshall } from '@aws-sdk/util-dynamodb';

    const result = await client.send(new ScanCommand({
      TableName: 'Users',
    }));

    ■ サンプル(FilterExpression + ページネーション)

    let lastKey: Record<string, unknown> | undefined;
    const items: unknown[] = [];
    do {
      const result = await client.send(new ScanCommand({
        TableName: 'Users',
        FilterExpression: 'attribute_exists(#n)',
        ExpressionAttributeNames: { '#n': 'name' },
        ExclusiveStartKey: lastKey,
      }));
      items.push(...(result.Items ?? []).map((i) => unmarshall(i)));
      lastKey = result.LastEvaluatedKey as Record<string, unknown> | undefined;
    } while (lastKey);

- ENTRY:
  EXPLAIN: BatchWriteItemCommand
  BODY: |
    ■ 概要

    ・PutItem / DeleteItem を複数テーブル・複数アイテムで一括送信
    ・1リクエストあたり 25 件まで(Put + Delete の合計)
    ・1アイテム 400KB 制限。超過分は UnprocessedItems で返る
    ・スロットリング等で処理されなかった分も UnprocessedItems に含まれる

    ■ 引数(必須)

    ・RequestItems: Record<string, WriteRequest[]>
        テーブル名をキー、WriteRequest の配列を値
        WriteRequest: { PutRequest: { Item } } または { DeleteRequest: { Key } }

    ■ 引数(任意)

    ・ReturnConsumedCapacity: string              "NONE","TOTAL","INDEXES"
    ・ReturnItemCollectionMetrics: string

    ■ 戻り値(BatchWriteItemCommandOutput)

    ・UnprocessedItems: Record<string, WriteRequest[]>
        処理されなかったテーブルとリクエストの対応
    ・ConsumedCapacity: ConsumedCapacity[]
    ・ItemCollectionMetrics: Record<string, ItemCollectionMetrics[]>[]
    ・$metadata: ResponseMetadata

    ■ サンプル(複数テーブルに Put + Delete)

    import { BatchWriteItemCommand } from '@aws-sdk/client-dynamodb';
    import { marshall } from '@aws-sdk/util-dynamodb';

    await client.send(new BatchWriteItemCommand({
      RequestItems: {
        Users: [
          { PutRequest: { Item: marshall({ userId: 'U001', name: '田中' }) } },
          { PutRequest: { Item: marshall({ userId: 'U002', name: '山田' }) } },
        ],
        Products: [
          { DeleteRequest: { Key: marshall({ productId: 'P001', category: 'electronics' }) } },
        ],
      },
    }));

- ENTRY:
  EXPLAIN: BatchGetItemCommand
  BODY: |
    ■ 概要

    ・複数テーブルから複数キーで一括取得(GetItem をまとめたイメージ)
    ・1リクエストあたり 100 件まで(キー数)
    ・複数テーブルに分散可能
    ・各キーは1アイテムを特定
    ・同一パーティションに限定されない
    ・未処理分は UnprocessedKeys で返り、リトライする

    ■ 引数(必須)

    ・RequestItems: Record<string, KeysAndAttributes>
        テーブル名をキー、KeysAndAttributes を値
        KeysAndAttributes: { Keys: Record<string, AttributeValue>[] }

    ■ 引数(任意)

    ・KeysAndAttributes 内
      ・ProjectionExpression: string
      ・ExpressionAttributeNames: Record<string, string>
    ・ReturnConsumedCapacity: string   "NONE","TOTAL","INDEXES"

    ■ 戻り値(BatchGetItemCommandOutput)

    ・Responses: Record<string, Record<string, AttributeValue>[]>
        テーブル名をキー、取得したアイテムの配列を値
    ・UnprocessedKeys: Record<string, KeysAndAttributes>
        スロットリング等で未処理のテーブルとキー
    ・ConsumedCapacity: ConsumedCapacity[]
    ・$metadata: ResponseMetadata

    ■ サンプル(複数テーブルから一括取得)

    import { BatchGetItemCommand } from '@aws-sdk/client-dynamodb';
    import { marshall, unmarshall } from '@aws-sdk/util-dynamodb';

    const result = await client.send(new BatchGetItemCommand({
      RequestItems: {
        Users: { Keys: [ marshall({ userId: 'U001' }), marshall({ userId: 'U002' }) ] },
        Products: { Keys: [ marshall({ productId: 'P001', category: 'electronics' }) ] },
      },
    }));

    const users = (result.Responses?.Users ?? []).map((i) => unmarshall(i));
    const products = (result.Responses?.Products ?? []).map((i) => unmarshall(i));

- ENTRY:
  EXPLAIN: 類似メソッドの使い分け
  BODY: |
    ■ QueryCommand & BatchGetItemCommand の使い分け

    ・同一パーティションの範囲取得・ソートキー条件 → QueryCommand
    ・複数テーブルやバラバラのキーをまとめて取得 → BatchGetItemCommand

    ■ QueryCommand

    ・同一テーブル(または LSI/GSI)に対し、1パーティションキー(+ソートキー条件)で"そのパーティション内"の複数アイテムを取得
    ・キー条件で範囲指定可能(BETWEEN, <, > 等)
    ・1回あたり最大 1MB、LastEvaluatedKey でページネーション

    ■ BatchGetItemCommand

    ・複数テーブルを指定可能
    ・各テーブルに"取得したいプライマリキーのリスト"を渡し、バラバラのキーで複数アイテムを一括取得
    ・各キーは1アイテムを特定(GetItem を複数まとめたイメージ)
    ・同一パーティション限定ではない

#-------------------------------
# @aws-sdk/util-dynamodb
#-------------------------------

- ENTRY:
  CATEGORY: |
    @aws-sdk/util-dynamodb

- ENTRY:
  EXPLAIN: リスト
  BODY: |
    ■ marshall

      ・JavaScript オブジェクトを DynamoDB の AttributeValue 形式に変換
      ・Item / Key / ExpressionAttributeValues 等に使用

    ■ unmarshall

      ・DynamoDB の AttributeValue 形式を JavaScript オブジェクトに変換
      ・GetItem / Query / Scan の戻りを扱うときに使用

    ■ convertToAttr

      ・単一の JavaScript 値を 1 つの AttributeValue に変換
      ・marshall の単一値版

    ■ convertToNative

      ・単一の AttributeValue を JavaScript 値に変換
      ・unmarshall の単一値版

- ENTRY:
  EXPLAIN: marshall & unmarshall
  BODY: |
    ■ 概要

    ・client-dynamodb の API は AttributeValue 形式(S/N/B/M/L 等)でやり取りする
    ・marshall で JS オブジェクト → AttributeValue、unmarshall で AttributeValue → JS オブジェクトに変換して扱いやすくする

    ■ marshall

    ・引数: オブジェクト(または配列)
    ・戻り: Record<string, AttributeValue> 形式
          string → { S }
          number → { N }(文字列)
          boolean → { BOOL }
          Array → { L }/{ SS }/{ NS }/{ BS }(型に応じる)
    ・オプション: convertEmptyValues, removeUndefinedValues 等で空文字・undefined の扱いを変更可能

    ■ unmarshall

    ・引数: Record<string, AttributeValue>
    ・戻り: 通常の JS オブジェクト
    ・GetItem / Query / Scan の Item や Items をそのまま渡して TS で扱う形に変換できる

    ■ サンプル(marshall で Item 投入)

    import { marshall } from '@aws-sdk/util-dynamodb';

    const item = marshall({
      userId: 'U001',
      name: '田中',
      score: 100,
      tags: ['front', 'back'],
    });
    // => { userId: { S: 'U001' }, name: { S: '田中' }, score: { N: '100' }, tags: { SS: ['front', 'back'] } }

    ■ サンプル(GetItem の戻りを unmarshall)

    import { unmarshall } from '@aws-sdk/util-dynamodb';

    const result = await client.send(new GetItemCommand({ TableName: 'Users', Key: marshall({ userId: 'U001' }) }));
    const user = result.Item ? unmarshall(result.Item) : null;

- ENTRY:
  EXPLAIN: convertToAttr & convertToNative
  BODY: |
    ■ 概要

    ・1 属性分だけ変換したいときに使用
    ・marshall / unmarshall の単一値版
    ・式の中で使う値や、1 つの AttributeValue だけを JS と相互変換する用途向け

    ■ convertToAttr

      ・引数: 単一の JS 値(string / number / boolean / null / Array / object 等)
      ・戻り: 1 つの AttributeValue
      
      ・例: convertToAttr('hello') => { S: 'hello' }、convertToAttr(100) => { N: '100' }

    ■ convertToNative

      ・引数: 1 つの AttributeValue
      ・戻り: 対応する JS 値
      
      ・例: convertToNative({ S: 'hello' }) => 'hello'、convertToNative({ N: '100' }) => 100

    ■ サンプル(convertToAttr)

    import { convertToAttr } from '@aws-sdk/util-dynamodb';

    const attr = convertToAttr('value');
    // => { S: 'value' }

    ■ サンプル(convertToNative)

    import { convertToNative } from '@aws-sdk/util-dynamodb';

    const val = convertToNative({ N: '42' });
    // => 42

#-------------------------------
# その他
#-------------------------------

- ENTRY:
  CATEGORY: その他

- ENTRY:
  EXPLAIN: 分岐メソッド
  BODY: |
    ■ 概要

    ・ConditionExpression / FilterExpression で使える組み込み関数一覧
    ・式内では属性名に予約語があれば #name
    ・値は :val で ExpressionAttributeNames / ExpressionAttributeValues を渡す

    ■ attribute_exists(path)

    ・指定したパスに属性が存在するとき true

    ・例: userId が存在するときだけ削除する条件

      ConditionExpression: 'attribute_exists(userId)',

    ■ attribute_not_exists(path)

    ・指定したパスに属性が存在しないとき true

    ・例: userId が存在しないときだけ書き込む条件

      ConditionExpression: 'attribute_not_exists(userId)',

    ■ attribute_type(path, type)

    ・属性の型が type のとき true
    ・type は S, N, B, SS, NS, BS, BOOL, NULL, L, M のいずれか(式では :t 等で渡す)

    ・例: name が文字列型(S)か

      ConditionExpression: 'attribute_type(#n, :t)',
      ExpressionAttributeNames: { '#n': 'name' },
      ExpressionAttributeValues: marshall({ ':t': 'S' }),

    ■ begins_with(path, substr)

    ・文字列属性が substr で始まるとき true

    ・例: userId が "USER_" で始まるとき

      ConditionExpression: 'begins_with(userId, :prefix)',
      ExpressionAttributeValues: marshall({ ':prefix': 'USER_' }),

    ■ contains(path, operand)

    ・文字列なら部分文字列を含むとき true
    ・Set(String Set / Number Set / Binary Set)なら指定要素を含むとき true
    ・List なら指定要素を含むとき true。いずれも path の型で挙動が決まる

    ・例: role が "admin" を含むか(文字列の部分一致)

      ConditionExpression: 'contains(#r, :v)',
      ExpressionAttributeNames: { '#r': 'role' },
      ExpressionAttributeValues: marshall({ ':v': 'admin' }),

    ・例: colors(SS) が "red" を要素に含むか

      ConditionExpression: 'contains(colors, :v)',
      ExpressionAttributeValues: marshall({ ':v': 'red' }),

    ■ size(path)

    ・文字列の長さ、バイナリのバイト数、Set/List/Map の要素数を返す
    ・比較演算子と組み合わせて使う

    ・例: name の文字列長が 10 以下

      ConditionExpression: 'size(#n) <= :max',
      ExpressionAttributeNames: { '#n': 'name' },
      ExpressionAttributeValues: marshall({ ':max': 10 }),
