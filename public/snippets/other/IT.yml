- ENTRY:
  EXPLAIN: プログラミング用語
  BODY: |
    invoke                              関数や処理を呼び出す（実行要求）
    emit                                イベントを発火する／送出する動作
    emitter                             イベントを発火するオブジェクト
    threshold                           しきい値（閾値）を示す値
    payload                             送信・転送されるデータ本体
    bootstrap                           起動処理／初期化の開始手続き
    deprecate                           非推奨に指定（将来削除の可能性）
    refactor                            振る舞いを変えず内部を整理する改修
    instantiate                         クラスなどをインスタンス化すること
    serialize                           オブジェクトを直列化（文字列化）する
    deserialize                         直列化データをオブジェクトに復元する
    concurrency                         同時実行性（複数処理の並行実行）
    latency                             レイテンシ／応答遅延の時間
    throughput                          単位時間当たりの処理量（スループット）
    idempotent                          冪等性（複数回実行しても同結果）
    atomic                              原子的な操作（途中不可分）
    immutable                           不変（変更不可）の性質
    mutable                             可変（変更可能）の性質
    transient                           一時的・揮発的な状態やデータ
    persistent                          永続的に保持される性質
    synchronous                         同期処理（順次実行）
    asynchronous                        非同期処理（並列やコールバック）
    callback                            呼び出し後に実行される関数／処理
    promise                             非同期結果を表すオブジェクト
    await                               Promise の完了を待つ構文
    middleware                          処理を仲介する層（挟み込みロジック）
    framework                           開発のための枠組み・土台

- ENTRY:
  EXPLAIN: 開発手法
  BODY: |
    Waterfall                           ウォーターフォール：フェーズが明確な逐次的な開発モデル
    Phase                               フェーズ：プロジェクトの段階・ライフサイクルのフェーズ
    Draft                               ドラフト：レビュー用の暫定版
    Refactor                            リファクタ：振る舞いを変えず内部構造を整理する改修
    Optimization                        オプティマイゼーション：性能や設計を改善・最適化する作業
    Regression                          リグレッション：変更で生じる既存機能の不具合（回帰）
    Boilerplate                         ボイラープレート：プロジェクトの雛形や初期コード
    Skeleton                            スケルトン：プロジェクトの雛形や初期コード
    Template                            テンプレート：プロジェクトの雛形や初期コード
    CI/CD                               CI/CD：継続的インテグレーションとデリバリー
    MVC (Model-View-Controller)         MVC（モデル・ビュー・コントローラ）：関心事を分離するアーキテクチャパターン
    DDD (Domain-Driven Design)          DDD（ドメインドリブンデザイン）：ドメインモデルに着目した設計手法
    PoC (Proof of Concept)              PoC：実現可能性を確認する概念実証

- ENTRY:
  EXPLAIN: 開発手法(アジャイル)
  BODY: |
    Agile                               アジャイル：反復的かつ漸進的に開発を進める手法
    Scrum                               スクラム：スプリントと役割で運営するアジャイル手法
    Sprint                              スプリント：期間を区切った反復作業（通常1〜4週間）
    Velocity                            ベロシティ：スプリントごとのチーム完了ストーリーポイント
    Story Points (SP)                   ストーリーポイント（SP）：工数・複雑さを相対評価する見積り単位
    Fibonacci                           フィボナッチ：ストーリーポイント推定で使われる数列
    Retrospective                       レトロスペクティブ：振り返りと改善を行うレビュー会議
    KPT (Keep, Problem, Try)            KPT：実行改善のための簡易振り返り手法
    Kanban                              カンバン：作業を可視化し流れで管理する手法
    XP (Extreme Programming)            XP（エクストリームプログラミング）：反復と実践を重視するアジャイル手法
    TDD (Test-Driven Development)       TDD：テストを先に書いてから実装する開発
    BDD (Behavior-Driven Development)   BDD：振る舞いを仕様として記述する開発手法
    MVP (Minimum Viable Product)        MVP：最小限の機能で価値検証する製品
    Pair Programming                    ペアプログラミング：2人で1件のコードを協働する手法
    Daily Stand-up                      デイリースタンドアップ：短時間の日次進捗共有ミーティング
    Backlog                             バックログ：未着手タスクや要求の優先付き一覧
    User Story                          ユーザーストーリー：ユーザー視点で価値を短く記述した要件

