    Memento                             メメント：状態のスナップショット保存と復元
    Visitor                             ビジター：データ構造を変えずに操作だけを追加
    Repository                          リポジトリ：データ取得・永続化をドメインから隠蔽
    Dependency Injection                依存性の注入：依存オブジェクトを外部から差し込む

