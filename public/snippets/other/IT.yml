      Nextjs                            ネクスト.js：SSR/SSG対応のReactフレームワーク
      Svelte                            スヴェルト：コンパイル時に効率化するUIフレームワーク
      Nestjs                            ネストJS：構造化されたサーバサイドフレームワーク
      Remix                             リミックス：フルスタック向けのReactベースフレームワーク
