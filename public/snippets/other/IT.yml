- ENTRY:
  EXPLAIN: デザインパターン
  BODY: |
    Closure                             クロージャ：関数とそのスコープを保持する構造
    Factory                             ファクトリ：オブジェクト生成を抽象化
    Singleton                           シングルトン：インスタンスを1つに制限
    Abstract Factory                    抽象ファクトリ：関連オブジェクト群をまとめて生成
    Builder                             ビルダー：複雑なオブジェクトを段階的に組み立てる
    Prototype                           プロトタイプ：既存インスタンスを複製して生成
    Adapter                             アダプター：既存のインターフェースを別の形に合わせる
