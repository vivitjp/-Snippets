<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebSocket テスト</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 40rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      #log {
        white-space: pre-wrap;
        background: #111;
        color: #e0e0e0;
        padding: 1rem;
        border-radius: 8px;
        min-height: 8rem;
        font-size: 0.9rem;
      }
      button {
        margin-right: 0.5rem;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <h1>WebSocket クライアント</h1>
    <p>
      接続するとサーバーから 1 分ごとに「Hello
      World」が届きます。返信を送ると引用付きで返ってきます。
    </p>
    <div>
      <button type="button" id="connect">接続</button>
      <button type="button" id="disconnect" disabled>切断</button>
    </div>
    <p>
      <input type="text" id="msg" placeholder="返信テキスト" size="40" />
      <button type="button" id="send" disabled>送信</button>
    </p>
    <div id="log"></div>
    <script>
      const logEl = document.getElementById("log");
      const wsUrl = () => {
        const p = location.protocol === "https:" ? "wss:" : "ws:";
        return `${p}//${location.host}`;
      };
      let ws = null;

      function log(line) {
        logEl.textContent += line + "\n";
        logEl.scrollTop = logEl.scrollHeight;
      }

      document.getElementById("connect").onclick = () => {
        if (ws && ws.readyState === WebSocket.OPEN) return;
        ws = new WebSocket(wsUrl());
        ws.onopen = () => {
          log("[open]");
          document.getElementById("disconnect").disabled = false;
          document.getElementById("send").disabled = false;
        };
        ws.onmessage = (ev) => log("<- " + ev.data);
        ws.onerror = () => log("[error]");
        ws.onclose = () => {
          log("[close]");
          document.getElementById("disconnect").disabled = true;
          document.getElementById("send").disabled = true;
        };
      };

      document.getElementById("disconnect").onclick = () => {
        if (ws) ws.close();
        ws = null;
      };

      document.getElementById("send").onclick = () => {
        const input = document.getElementById("msg");
        const t = input.value.trim();
        if (!t || !ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(t);
        log("-> " + t);
        input.value = "";
      };
    </script>
  </body>
</html>
